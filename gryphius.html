    ],
    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">Wer über alle steigt und von der stolzen Höhe der reichen Ehre schaut, wie schlecht der Pöbel geht, wie ein Reich unter ihm in lichten Flammen kracht, wie dort der Wellen Schaum sich in die Felder macht, und wie hier der Himmel[s] Zorn, mit Blitz und Knall vermischt, in Türme und Tempel fährt, und [wie] der heiße Tag [das] verbrennt, was die Nacht erfrischt, und [wie er] seine Sieges-Zeichen hier und da verschränkt mit vielmal tausend Leichen sieht;</div><div class=\"syntax-gloss\">= 谁登上所有人之上，从富贵荣耀的骄傲高处俯看：庶民如何卑微地行走，王国如何在烈焰中崩裂，浪沫如何漫上田野，天之怒如何带着闪电和雷鸣劈入塔楼与神殿，白昼如何焚毁夜晚所滋润的一切，以及如何看见他的胜利标记与成千尸骸交错——</div></div><p>全段为一个巨大的 <b>Wer</b>（谁）引导的关系从句，主句在第9行才出现（Hat wol...viel über die gemein）。8行诗都是从句，以层层 <b>wie</b>（如何）引导的并列宾语从句展开。这种\"悬吊式\"句法（Spannsatz）是巴洛克诗歌的典型特征——制造宏伟的气势和等待感。</p><p><b>schlecht</b> 在17世纪义为\"简单的、卑微的\"（≠ 现代义\"坏\"）。</p>",
    "meaning": "<p>帕皮尼安独白的开篇，描绘一个站在权力巅峰之人的视角：他从高处俯瞰一切——卑微的平民、崩塌的王国、自然灾难（洪水、雷电）、战争的尸山。</p><p>这8行诗构成一幅全景式的\"权力之巅\"画面。掌权者似乎凌驾于一切毁灭之上，但景象本身暗含不祥：他所看到的全是毁灭和死亡。巴洛克文学的核心母题——<b>vanitas</b>（虚空）与权力的脆弱性——已在此铺垫。</p><p>注意\"夜晚所滋润的一切被白昼焚尽\"这一对比：自然的日夜交替被转化为毁灭与更新的隐喻。</p>",
    "interpretation": "<p>Gryphius 采用了巴洛克诗歌典型的<b>高处-坠落</b>（Höhe-Sturz）母题。第一段建立\"高处\"，与后文的\"坠落\"形成对比结构。</p><p>8行诗仅为一个长句的前半部分，句法上悬而未决——恰如站在高处的人尚未意识到即将到来的坠落。语言本身模拟了悬崖边缘的张力。</p><p>意象的堆叠（火焰、洪水、雷电、尸骸）来自塞内加悲剧的修辞传统。Gryphius 的 Papinianus 以斯多葛哲学为底色：世间权势皆如火焰般转瞬即灭。</p><p><b>\"Sieges-Zeichen verschränckt mit Leichen\"</b>——\"胜利标记与尸骸交错\"是全段最有力的意象：荣耀与死亡从来不可分离。</p>",
    "translationNote": "<p>\"schlecht\"在巴洛克德语中义为\"简朴的、卑微的\"，而非现代义\"糟糕的\"。\"Pöfel\"= Pöbel（庶民），带贬义。\"jhm\"= ihm，\"auff\"= auf，\"Thürm\"= Türme——这些都是17世纪的标准拼写。</p><p>全段由一个 Wer 引导的关系从句构成，中文无法完全保留悬置结构，故拆分为多个分句，以\"谁若……看……看……\"的排比传达原文的铺陈气势。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（偶韵 aa bb）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">谁登高处傲然俯众生，(a)<br>看尽荣华与庶民的行程，(a)<br>看王国在烈焰中碎裂，(b)<br>看浪沫漫向原野如雪，(b)<br>看天怒携雷电一齐发，(c)<br>劈入塔殿——夜润之物尽焚化，(c)<br>看酷日烧尽一切夜之凉，(d)<br>胜利标记与万千尸骸缠一行。(d)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>原文为亚历山大体偶韵（aa bb cc dd）。中文勉强以\"生/程\"\"裂/雪\"\"发/化\"\"凉/行\"押近似韵。偶韵体的整齐感在中文里很难完美复现，因为德语的阴性韵/阳性韵交替在中文无直接对应。</div>",

    "lines": [
      {
        "de": "Hat wol (ich geb es nach) viel über die gemein.",
        "indent": false
      },
      {
        "de": "Ach! aber! ach wie leicht nimmt jhn der Schwindel ein",
        "indent": false
      },
      {
        "de": "Und blendet unverhofft sein zitterndes Gesichte /",
        "indent": false
      },
      {
        "de": "Daß er durch gähen Fall wird ehr man denckt zu nichte.",
        "indent": false
      },
      {
        "de": "Wie leichte bricht der Fels auff dem er stand gefast /",
        "indent": false
      },
      {
        "de": "Und reist jhn mit sich ab! bald wird der Gipffel Last",
        "indent": false
      },
      {
        "de": "Dem Abgrund selbst zu schwer / daß Berg und Thal erzittert /",
        "indent": false
      },
      {
        "de": "Und sich in Staub und Dampff in weite Brüche splittert;",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "确实拥有（我承认）远超常人之物。",
        "indent": false

      {
        "text": "哎！可是！唉，眩晕多么轻易就将他攫住，",
        "indent": false

      {
        "text": "出乎意料地蒙蔽他颤抖的视线——",
        "indent": false

      {
        "text": "使他因猝然坠落，不及人想便化为乌有。",
        "indent": false
      },
      {
        "text": "他脚下的磐石多么容易碎裂，",
        "indent": false
      },
      {
        "text": "将他一同拖下！转眼那巅峰的重负",
        "indent": false
      },
      {
        "text": "连深渊自身都承受不住——山川震颤，",
        "indent": false
      },
      {
        "text": "碎裂为尘埃与烟雾，崩入无尽的裂谷；",
        "indent": false
      }

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">[Wer über alle steigt...] hat wohl (ich gebe es nach) viel über die Gemein[en]. Ach! aber ach, wie leicht nimmt ihn der Schwindel ein und blendet unverhofft sein zitterndes Gesicht, dass er durch jähen Fall zunichte wird, ehe man [es] denkt. Wie leicht bricht der Fels, auf dem er fest gestanden [hat], und reißt ihn mit sich ab! Bald wird des Gipfels Last dem Abgrund selbst zu schwer, dass Berg und Tal erzittert und sich in Staub und Dampf in weite Brüche splittert.</div><div class=\"syntax-gloss\">= [站在高处的人]确实拥有远超常人之物。可是啊，眩晕多么轻易便攫住了他，出乎意料地蒙蔽他颤抖的视线，使他在人还来不及反应之前便因骤然坠落而化为乌有。他脚下的磐石多么容易碎裂，将他一同拖坠！很快巅峰的重负连深渊自身也承受不住，山川为之震颤，碎裂为尘烟，崩入广袤的裂谷。</div></div><p>第9行\"Hat wol...viel über die gemein\"是第1段8行长从句的<b>主句</b>——终于在这里揭晓。紧接着以\"Ach! aber! ach\"感叹转折，进入\"坠落\"主题。</p><p><b>ehr man denckt</b> = ehe man denkt（在人想到之前）。<b>zu nichte</b> = zunichte（化为虚无）。</p>",
    "meaning": "<p>前一段的长句终于在此收束：那个站在高处的人确实超越了常人（\"viel über die gemein\"）。但紧接着三重感叹\"Ach! aber! ach\"急转直下——眩晕（Schwindel）将高处之人攫住。</p><p>从\"眩晕\"到\"坠落\"到\"磐石碎裂\"到\"山崩\"——毁灭的过程层层递进。不仅人坠落了，连他脚下的磐石（Fels）、巅峰本身（Gipfel）都碎裂崩塌，其重力甚至压垮了深渊。这是巴洛克式的极端夸张（Hyperbel）。</p><p>\"zu nichte\"（化为虚无）呼应巴洛克的核心概念：一切终归虚空（vanitas vanitatum）。</p>",
    "interpretation": "<p>本段实现了巴洛克诗学的经典结构：<b>高处（Höhe）→ 坠落（Sturz）</b>。这不仅是物理性的坠落，更是存在论层面的虚无化（zunichte werden）。</p><p>\"Ach! aber! ach\"——破格的三重感叹打断了此前冷静的全景叙述。帕皮尼安从旁观者突然转为自我警醒者，预见了自己（以及一切权势者）的命运。</p><p><b>Schwindel</b>（眩晕）一词双关：既指身体的头晕，也暗示道德的迷失——高处之人被权力冲昏头脑。</p><p>磐石碎裂、山崩地裂的意象来自《圣经》传统（如但以理书2:34-35 中击碎巨像的石头），同时也呼应了斯多葛哲学中\"命运之轮\"（rota fortunae）的母题。</p>",
    "translationNote": "<p>\"gähen\"= jähen（突然的），巴洛克时代 g 与 j 在词首常互换。\"ehr\"= ehe（在……之前）。\"zu nichte\"= zunichte（化为虚无），今写作一词。\"auff\"= auf，\"denckt\"= denkt，\"Gipffel\"= Gipfel——均为17世纪正字法。</p><p>\"ich geb es nach\"是一个插入语（Parenthese），表达让步：\"我承认\"。中文保留括号以标示这一语法特征。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（偶韵 aa bb）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">确有超群之位——我不否认。(a)<br>然而！眩晕多易将他掳去沉沦，(a)<br>猝然蒙蔽他颤抖的双目，(b)<br>骤然坠落，他化为虚无一族。(b)<br>磐石何等轻易便崩碎，(c)<br>将他拖入绝境！巅峰之重如山累，(c)<br>深渊难承其重，山川俱震颤，(d)<br>碎为尘烟，崩入无尽裂谷间。(d)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>原文偶韵 aa bb。中文以\"认/沦\"\"目/族\"\"碎/累\"\"颤/间\"近似模拟。\"他化为虚无一族\"为凑韵而生硬，体现了偶韵翻译的固有困难。</div>",

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">Bald saust der rauhe Nord, und [wenn] er dem zu fest steht, so bringt der faule Süd die ungeheure Pest, die man Verleumdung heißt! Wen hat die [Verleumdung] nicht bekriegt? Wen hat sie nicht besiegt, wenn der Neid ihr beifällt? Was ist es, Papinian, dass du die Spitze erreicht [hast]? Dass keiner dir an Stand, noch Macht, noch Hoheit gleicht? Dass Lager, Hof und Rat und Reich dir anvertraut [sind]? Dass Hauptmann und Soldat bloß auf dein Winken schaut?</div><div class=\"syntax-gloss\">= 转眼粗暴的北风呼啸，如果他抵住了，腐臭的南风就送来那可怕的瘟疫——人们称之为诽谤！谁未被它攻击过？当嫉妒支援它时，谁未被它击败过？帕皮尼安，你登上了顶峰又如何？无人在地位、权力、尊贵上与你比肩又如何？军营、宫廷、谘议院和帝国都托付于你又如何？百夫长和士兵都只看你示意又如何？</div></div><p>本段分为两个部分：(1) 第17-20行，以北风/南风比喻引入\"诽谤\"主题，用两个反问句（wehn hat...nicht）强调诽谤的不可抗拒；(2) 第21-24行，帕皮尼安直接以自己为对象，用四个 <b>Daß</b> 从句排比质问：你拥有的这一切又有什么用？</p><p><b>steht er dem zu fest</b> = 如果他对此站得太稳（即：即使他抵抗住了北风的攻击）。</p>",
    "meaning": "<p>前两段描述了高处坠落的物理性比喻，本段引入政治层面的威胁：<b>诽谤</b>（Verleumdung）。</p><p>北风和南风的比喻来自古典修辞：北风代表明面上的暴力威胁，南风代表暗中的腐蚀——即使你抵挡住了正面攻击，背后的诽谤与嫉妒仍会将你击垮。\"faul\"（腐臭的）形容南风，暗示诽谤是一种隐蔽的毒害。</p><p>第21行起，帕皮尼安以\"Was ists...daß\"（又如何……即使）的句式直接自问：你已经权倾天下——军队、宫廷、国家都在你手中——但这又能怎样？排比句的气势恰恰凸显了一切成就的虚妄。</p>",
    "interpretation": "<p>本段从自然灾变的比喻转入政治现实，是帕皮尼安自我认知的关键时刻。他已不再描述\"某个\"高处之人的命运，而是直呼己名（\"Was ists Papinian\"），将之前的警示完全内化。</p><p><b>诽谤与嫉妒</b>是巴洛克宫廷文学的核心主题。Gryphius 在帕皮尼安身上投射了17世纪知识分子对宫廷政治的深切恐惧——你可以战胜一切敌人，却无法战胜流言。</p><p>四个 <b>Daß</b> 排比从句构成了<b>渐进式列举</b>（Klimax）：Stand（地位）→ Macht（权力）→ Hoheit（尊贵）→ Läger, Hof, Rath, Reich（军政教国）→ Hauptmann und Soldat（军事指挥权）。权力的完整性在此刻呈现得最充分——但恰恰是这种\"无所不有\"构成了最大的危险。</p><p>历史上的帕皮尼安（Papinianus）是罗马法学家，公元212年因拒绝为卡拉卡拉弑兄辩护而被处死——他的正直正是他覆灭的原因。</p>",
    "translationNote": "<p>\"faul\"在17世纪既可指\"懒惰\"也可指\"腐臭、有毒\"，此处取后义，与\"Pest\"（瘟疫）搭配。\"Verläumbdung\"= Verleumdung（诽谤），巴洛克拼写保留了词源中的 b。\"heist\"= heißt，\"wehn\"= wen（谁，宾格），\"beyfällt\"= beifällt（助阵）。</p><p>\"Was ists\"= Was ist es，口语缩略，传达自问自答的语气。翻译为\"这又如何\"以保留反问的力量。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（偶韵 aa bb）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">北风呼啸来势猛，抵住了——(a)<br>南风又送瘟毒与谗言攻，(a)<br>世称诽谤！谁不曾遭其祸？(b)<br>嫉妒助阵时，谁能独自躲？(b)<br>帕皮尼安，登顶又怎样？(c)<br>无人与你比肩权势与荣光？(c)<br>军营宫廷国政皆归你主宰？(d)<br>将士士卒只凭你一眼安排？(d)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>\"猛/攻\"\"祸/躲\"\"样/光\"\"宰/排\"押近似偶韵。\"谗言攻\"为凑韵而偏离原意（原文用\"瘟疫\"比喻诽谤，而非直说）。四个 Daß 排比在中文押韵版中有所压缩。</div>",

      "note": "<p><b>fest / Pest</b> 押韵（a），<b>bekriget / besiget</b> 押韵（b），<b>erreicht / gleicht</b> 押韵（c），<b>anvertrauet / schauet</b> 押韵（d）。</p><p>注意 a 韵 <b>fest / Pest</b>——\"站稳\"与\"瘟疫\"押在一起，暗示你越是站稳，瘟疫（诽谤）越是瞄准你。c 韵 <b>erreicht / gleicht</b>——\"达到\"与\"比肩\"押韵，勾勒出孤独的巅峰：无人能比肩，也意味着无人能相助。</p><p>第20行的格律值得注意：中间停顿出现了两次（sie / ... beyfällt / ... besiget），打破了标准亚历山大体的对称性，模拟了追问的急促语气。</p>"

    "syntax": "<p><b>第25–30行</b>延续第三节的 <i>Daß</i>- 排比从句（Anaphora），继续列举帕皮尼安的荣耀地位：</p><ul><li><b>Daß dich das Römsche Volck der Länder Vater nennt</b> → 还原：Das Römsche Volck nennt dich der Länder Vater（罗马人民称你为万邦之父）。nennen + 双宾语结构（Akk. + Akk.）。</li><li><b>Daß dich Sud / Ost und West / und raue Scyth' erkennt</b> → 主语为四方民族（南、东、西及斯基泰），动词 erkennt（承认、认可）。</li><li><b>Daß du mit Schwägerschafft den Kaysern nah verbunden</b> → verbunden 为 verbinden 的过去分词，与 bist 构成被动/状态完成时（省略助动词）。</li><li><b>Daß dich Sever stets trew / du jhn stets Freund befunden</b> → 交叉结构（Chiasmus）：Sever 视你为忠臣 ↔ 你视他为朋友。befunden = befinden 过去分词，省略助动词 hast/hat。</li><li><b>Daß er in dem er schid, die Kinder dir befahl</b> → in dem = indem（当……时）；schid = schied（离世）；befahl 支配双宾语（dir + die Kinder）。</li><li><b>Und baut auff deine Brust sein höchstes Ehren-Mahl</b> → baut = bauet，现在时用于历史叙述（historisches Präsens）；auff = auf。</li></ul><p><b>第31行转折</b>：</p><ul><li><b>Wenn eben diß die Klipp' an der dein Schiff wird brechen!</b> → Wenn = 如果/倘若；diß（dies）指代前述所有荣耀；关系从句 an der dein Schiff wird brechen = an der dein Schiff brechen wird（你的船将在此触礁）。航海隐喻。</li></ul><p><b>第32–34行</b>开启新的长句（跨越至下一节）：</p><ul><li><b>Nun mich die Warheit nicht umb Laster kan besprechen</b> → 还原：Nun die Warheit mich nicht umb Laster besprechen kan（既然真理不能以罪恶指控我）。besprechen 此处意为'指控、非议'。</li><li><b>Ist Tugend mein Verweiß</b> → 主句：美德便是我的罪状。倒装句（动词提前表条件/结论）。</li><li><b>die als sie durch die Nacht / Mit hellen Strahlen drang und sich durchläuchtig macht</b> → 关系从句修饰 Tugend：美德穿透黑夜，以光芒照耀自身。als = 当……时；drang = dringen 过去式。</li></ul>",
    "meaning": "<p>本节延续第三节的排比追问，继续列举帕皮尼安所享有的崇高地位：他被罗马人民尊称为\"万邦之父\"，四方皆知其名，他与皇室有姻亲之谊，塞维鲁皇帝始终信任他并在临终时将两个儿子（卡拉卡拉与盖塔）托付于他。这些荣耀本应是他的护身符，然而第31行以\"Wenn\"（倘若）一转，揭示出这一切恰恰可能成为毁灭他的礁石。</p><p>第32–34行开启新的思路：既然没有人能以真正的罪恶来指控帕皮尼安，那么他的\"美德\"本身就成了他的罪状。这里运用了光明与黑暗的隐喻——美德如同光芒穿透黑夜，但正因其光辉，反而激起了黑暗势力（嫉妒与阴谋）的反扑。</p>",
    "interpretation": "<p><b>荣耀即危险</b>（Paradox）：第25–30行的排比句表面上是荣耀的累积，但在第31行被一个航海隐喻彻底颠覆——所有这些荣耀不过是船将撞碎的礁石。这是典型的巴洛克\"荣华转瞬即逝\"（Vanitas）母题：地位越高，跌落越惨。</p><p><b>美德之悖论</b>：第32–34行提出了全剧的核心悖论——帕皮尼安无罪可寻，因此美德本身成了他被迫害的理由。这呼应了塞涅卡式的斯多葛悲剧传统：正直之人在暴政下恰因正直而受难。</p><p><b>光明隐喻</b>：Tugend（美德）穿透黑夜（Nacht），以光芒（helle Strahlen）照耀自身，却因此激起\"雾气\"（下一节的 Nebel/Dünste）。这一隐喻系统在第五节将进一步展开为雷暴意象。</p><p><b>历史背景</b>：帕皮尼安（Aemilius Papinianus）确为塞维鲁的亲信与托孤重臣，据载与皇后尤利娅·多姆娜有亲戚关系（Schwägerschaft）。卡拉卡拉杀弟盖塔后命帕皮尼安为弑弟辩护，帕皮尼安拒绝，遂被处死。</p>",
    "translationNote": "<p><b>\"der Länder Vater\"</b>：直译\"各国之父\"，对应拉丁语 <i>Pater Patriae</i>（国父），此为罗马最崇高的荣誉称号之一。</p><p><b>\"raue Scyth'\"</b>：Scythe 指斯基泰人，古希腊罗马文学中常用来代指一切北方蛮族。省音符号（'）表示省略了词尾的 -e。raue = rauh（粗野的）。</p><p><b>\"jhn\"</b>：巴洛克拼写，= ihn（他，宾格）。</p><p><b>\"Ehren-Mahl\"</b>：复合词，Ehren（荣誉的）+ Mahl（标记、纪念碑），不同于现代 Ehrenmal 有时也写作 -mal。此处 Mahl 含\"纪念碑\"之意。</p><p><b>\"Klipp'\"</b>：= Klippe（礁石）。航海隐喻：帕皮尼安的命运如同一艘船驶向礁石。</p><p><b>\"besprechen\"</b>：此处为早期近代德语用法，意为'指控、非议'，不同于现代德语的'讨论'。</p><p><b>\"durchläuchtig\"</b>：词义双关——既指\"光辉灿烂的\"，又是日后 Durchlaucht（殿下）称号的词源。此处取其字面义。</p>",
    "altTranslation": "<p><b>韵译尝试</b>：</p><p>罗马万民尊你邦国父，<br/>四方蛮夷亦知你名姓处。<br/>姻亲之谊连结帝王家，<br/>君臣相契忠义共天涯。<br/>临终托孤将二子相付，<br/>丰碑筑于你胸膛深处。<br/>倘若此荣正是礁石暗，<br/>你的航船便将碎其畔！<br/>既无罪名可加我身上，<br/>美德竟成我唯一罪状——<br/>它穿透暗夜放出光芒，<br/>光辉越盛暗影越疯狂——</p><p><b>注</b>：韵译力求保留原文的排比（Daß...）结构与第31行的突然转折。\"礁石暗\"/\"碎其畔\"对应原文航海隐喻。末两行预示下节的雷暴意象。</p>",

    "lines": [
      {
        "de": "Viel Nebel hat erweckt die sich in Dünste theilen",
        "indent": false
      },
      {
        "de": "Und umb und neben mich als Donner-Wolcken eilen",
        "indent": false
      },
      {
        "de": "Von harten Knallen schwer und schwanger mit der Noth",
        "indent": false
      },
      {
        "de": "Erhjtzt durch rote Glut gestärckt mit Ach und Tod.",
        "indent": false
      },
      {
        "de": "Welch rasen steckt euch an in Zanck verwirrte Brüder!",
        "indent": false
      },
      {
        "de": "Ists billich daß ein Mensch selbst wüt' in seine Glieder /",
        "indent": false
      },
      {
        "de": "Und eifer in sein Fleisch? Wie? Oder mag das Reich",
        "indent": false
      },
      {
        "de": "Das ersten Grund gelegt auff brüderliche Leich /",
        "indent": false
      }
    ],
    "cn": [

        "indent": false

        "indent": false

        "indent": false

        "indent": false
      },
      {
        "text": "竟向自己的骨肉逞凶？什么？难道那个帝国——",
        "indent": false
      },
      {
        "text": "最初便将根基奠定在兄弟的尸骸之上的帝国——",
        "indent": false
      }

    "syntax": "<p><b>第35–38行</b>（承接上节，属同一长句）：</p><ul><li><b>Viel Nebel hat erweckt</b> → 主语是上节的 Tugend（美德），此处省略。还原：[Die Tugend] hat viel Nebel erweckt（美德激起了许多迷雾）。hat erweckt = 现在完成时。</li><li><b>die sich in Dünste theilen</b> → 关系从句修饰 Nebel：这些雾化为蒸汽。theilen = teilen（巴洛克拼写）。</li><li><b>Und umb und neben mich als Donner-Wolcken eilen</b> → 继续关系从句：如雷暴云一般在我周围奔涌。umb = um。</li><li><b>Von harten Knallen schwer und schwanger mit der Noth</b> → 形容词短语修饰 Donner-Wolcken：沉甸甸地充满雷鸣，孕育着灾难。schwer 与 schwanger 并列。</li><li><b>Erhjtzt durch rote Glut gestärckt mit Ach und Tod</b> → 两个过去分词短语并列：被红色火焰加热 + 被哀号与死亡壮大。Erhjtzt = erhitzt（j=i）。</li></ul><p><b>第39–42行</b>（新句，转向直接呼告）：</p><ul><li><b>Welch rasen steckt euch an</b> → 还原：Welches Rasen steckt euch an?（什么疯狂感染了你们？）。anstecken = 感染、传染。</li><li><b>in Zanck verwirrte Brüder</b> → 呼格（Vokativ）：在争斗中迷失的兄弟们！指卡拉卡拉与盖塔。</li><li><b>Ists billich daß ein Mensch selbst wüt' in seine Glieder</b> → Ists = Ist es；反问句：一个人对自己的肢体施暴，这合理吗？身体隐喻（Glieder = 肢体 = 帝国的组成部分）。</li><li><b>Und eifer in sein Fleisch?</b> → 并列：竟向自己的骨肉逞凶？</li><li><b>Wie? Oder mag das Reich / Das ersten Grund gelegt auff brüderliche Leich</b> → mag = 能够、岂能；还原：Oder mag das Reich, das [seinen] ersten Grund auff brüderliche Leich gelegt [hat]...（那个将根基奠定在兄弟尸骸上的帝国难道……）。暗指罗穆路斯杀弟雷穆斯的建城传说。句子跨越至下一节。</li></ul>",
    "meaning": "<p>本节分为两个层次。<b>第35–38行</b>承接上一节的光明隐喻，将其发展为完整的雷暴意象：美德的光芒穿透黑夜之后，反而激起了雾气与乌云——这些雾气化为雷暴云，裹挟着雷鸣、灾难、烈焰与死亡，围绕在帕皮尼安周围。这四行是对阴谋势力的精妙比喻：嫉妒与诽谤如同被美德之光蒸腾起的毒雾，最终凝聚为致命的风暴。</p><p><b>第39–42行</b>突然转向直接呼告（Apostrophe），帕皮尼安以修辞问句质问卡拉卡拉与盖塔两兄弟：是什么疯狂让你们互相残杀？他用身体的隐喻——对自己的肢体和骨肉施暴——来描述兄弟阋墙的荒谬，并引出罗马建城的原罪典故。</p>",
    "interpretation": "<p><b>雷暴意象体系</b>：第35–38行构建了一套完整的自然灾害隐喻链——雾气 → 蒸汽 → 雷暴云 → 雷鸣 → 火焰 → 死亡。这一层层递进的意象对应着政治阴谋从暗流涌动到公开爆发的过程，是巴洛克诗歌典型的\"积聚式\"修辞（Amplificatio）。</p><p><b>美德的悖论深化</b>：与上节呼应——美德越光辉，激起的黑暗反扑就越猛烈。这一逻辑是斯多葛哲学与基督教殉道思想的交汇：义人必然遭受苦难。</p><p><b>身体政治学</b>（Corpus-Metaphorik）：第40–41行\"一个人对自己的肢体施暴\"（wüt' in seine Glieder / eifer in sein Fleisch）运用了古典的\"国家即身体\"隐喻，兄弟即帝国之肢体，内斗即自残。</p><p><b>罗马原罪</b>：第42行\"auff brüderliche Leich\"暗指罗穆路斯杀弟雷穆斯建造罗马城的传说，暗示兄弟相残是罗马帝国的\"原罪\"——从建城之日起就注定循环重演。这一典故给全剧的悲剧结局蒙上了宿命色彩。</p>",
    "translationNote": "<p><b>\"Erhjtzt\"</b>：巴洛克拼写中 j 常代替 i，故 Erhjtzt = erhitzt（加热的、激化的）。</p><p><b>\"theilen\"</b>：= teilen（分裂、分散），巴洛克拼写保留 th-。</p><p><b>\"Donner-Wolcken\"</b>：Wolcke 为 Wolke 的巴洛克拼写；复合词 Donnerwolke = 雷暴云。</p><p><b>\"billich\"</b>：= billig，但在早期近代德语中意为\"合理的、正当的\"（英语 equitable），不是现代德语的\"便宜的\"。</p><p><b>\"eifer in sein Fleisch\"</b>：eifern 在此处不是现代义\"热衷于\"，而是\"发狂地攻击\"。in + Akk. 表方向，即向自己的肉体发狂。</p><p><b>\"brüderliche Leich\"</b>：Leich = Leiche（省音）；brüderlich = 兄弟的。典出罗穆路斯杀雷穆斯（Romulus/Remus）。</p><p><b>\"Das ersten Grund gelegt\"</b>：省略了定冠词 seinen 和助动词 hat，完整为 das seinen ersten Grund auf brüderliche Leiche gelegt hat。</p>",
    "altTranslation": "<p><b>韵译尝试</b>：</p><p>激起层层迷雾化为烟，<br/>如雷暴之云绕我旋。<br/>沉沉雷鸣载满灾与厄，<br/>赤焰催生哀号伴死别。<br/>什么疯狂缠住你们，阋墙的兄弟！<br/>自残肢体，自伤骨肉，岂非悖理？<br/>什么？难道这帝国——还记得吗，<br/>根基本就筑在兄弟的血泊之下——</p><p><b>注</b>：韵译以\"烟/旋\"\"厄/别\"\"弟/理\"\"吗/下\"构成近似对韵。\"阋墙\"典出《诗经·小雅》\"兄弟阋于墙\"，恰好对应原文 in Zanck verwirrte Brüder。末两行有意留下悬念，因原文句子跨越至下一节。</p>",

    "lines": [
      {
        "de": "Nicht unter beyden stehn? Ist euch der Länder mänge /",
        "indent": false
      },
      {
        "de": "Die grosse weite See / ja selbst die Welt zu enge?",
        "indent": false
      },
      {
        "de": "Man theilte ja vorhin, wofern deß Blutes Band",
        "indent": false
      },
      {
        "de": "Euch nicht mehr zwingen kan / so scheid euch Flut und Sand!",
        "indent": false
      },
      {
        "de": "Nah / dient es länger nicht / wofern nicht Rom soll zittern",
        "indent": false
      },
      {
        "de": "Ob einem Jammer-Spiel. Mir ahnts! es wil sich wittern",
        "indent": false
      },
      {
        "de": "Ich schaw deß Brudern Faust im brüderlichen Haar",
        "indent": false
      },
      {
        "de": "Die grosse Stadt in noth / die Länder in gefahr /",
        "indent": false
      },
      {
        "de": "Die Flott in lichtem brand / den hohen Thron zustücket /",
        "indent": false
      },
      {
        "de": "Und mich durch eines Fall (doch ohne Schuld) erdrücket.",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "难道不能在两者之间维系吗？难道各国之广袤、",
        "indent": false
      },
      {
        "text": "浩瀚的大海、乃至整个世界对你们来说都太狭窄？",
        "indent": false
      },
      {
        "text": "以前人们就曾分治过——倘若血脉之纽带",
        "indent": false
      },
      {
        "text": "再也无法约束你们，那就让海洋和沙漠将你们分隔！",
        "indent": false
      },
      {
        "text": "好吧，若和睦已无用——但总不该让罗马",
        "indent": false
      },
      {
        "text": "为一出悲惨的戏剧而颤抖。我有预感！风暴将至——",
        "indent": false
      },
      {
        "text": "我看见兄弟的拳头揪住兄弟的头发，",
        "indent": false
      },
      {
        "text": "伟大的城市陷入灾难，各省份岌岌可危，",
        "indent": false
      },
      {
        "text": "舰队在烈焰中燃烧，崇高的皇座被击碎，",
        "indent": false
      },
      {
        "text": "而我也因一人之陨落（虽无罪过）被压碎。",
        "indent": false
      }

    "syntax": "<p><b>第43–44行</b>（承接上节未完成的句子）：</p><ul><li><b>Nicht unter beyden stehn?</b> → 还原：Oder mag das Reich nicht unter beyden stehn?（那个帝国难道不能在两者之间存续？）。承接上节 mag das Reich... 的反问。</li><li><b>Ist euch der Länder mänge / Die grosse weite See / ja selbst die Welt zu enge?</b> → 还原：Ist die Mänge der Länder, die grosse weite See, ja selbst die Welt euch zu enge?（各国之广袤、大海、乃至世界对你们来说太狭窄了吗？）。三重递进式反问。</li></ul><p><b>第45–46行</b>：</p><ul><li><b>Man theilte ja vorhin</b> → 不定主语 man；vorhin = 从前；theilte = 过去式。\"从前人们就分治过\"——暗指罗马帝国分治的先例。</li><li><b>wofern deß Blutes Band / Euch nicht mehr zwingen kan</b> → wofern = 如果、倘若；deß Blutes Band = 血脉的纽带（属格前置）。条件从句。</li><li><b>so scheid euch Flut und Sand</b> → so 引导主句；scheid 为祈使语气或虚拟式（让海洋和沙漠将你们分隔）。Flut und Sand = 海洋与沙漠，代指自然疆界。</li></ul><p><b>第47–48行</b>：</p><ul><li><b>Nah / dient es länger nicht</b> → Nah = Nun（好吧）；es dient nicht = 无用、无济于事。</li><li><b>wofern nicht Rom soll zittern / Ob einem Jammer-Spiel</b> → wofern nicht = 如果不想让；ob = 因为、由于（早期近代德语用法）；Jammer-Spiel = 悲剧。</li><li><b>Mir ahnts! es wil sich wittern</b> → 两个短促的感叹句：我有预感！风暴将至！es wil sich wittern = 非人称用法，天气将变。</li></ul><p><b>第49–52行</b>（预言式异象，连续并列结构）：</p><ul><li><b>Ich schaw deß Brudern Faust im brüderlichen Haar</b> → schaw = schaue（我看见）；deß Brudern = des Bruders（属格）；Faust im Haar = 拳头揪住头发——兄弟扭打的暴力画面。</li><li><b>Die grosse Stadt in noth / die Länder in gefahr</b> → 两个并列的介词短语（Akk. + in + Dat.），对仗工整。</li><li><b>Die Flott in lichtem brand / den hohen Thron zustücket</b> → Flott = Flotte（舰队）；lichtem brand = 明亮的烈焰；zustücket = zerstückt（击碎）。</li><li><b>Und mich durch eines Fall (doch ohne Schuld) erdrücket</b> → 括号中的插入语\"doch ohne Schuld\"（虽无罪过）是全段的情感高潮：帕皮尼安预见自己将因一人之败亡而被殃及，但他是清白的。</li></ul>",
    "meaning": "<p>本节是帕皮尼安独白的情感高潮。前四行以反问句式质问两兄弟：难道整个世界都容不下你们二人？——既然血脉之情已无法约束你们，那就分治帝国吧。这呼应了历史上帕皮尼安确曾建议卡拉卡拉与盖塔分治帝国的记载。</p><p>第47–48行语气急转，短促的感叹句\"Mir ahnts! es wil sich wittern\"标志着帕皮尼安从理性劝谏转入先知式的预言——他预见了即将到来的灾难。</p><p>最后四行以排比式的异象呈现未来的恐怖图景：兄弟厮打、城市蒙难、各省危亡、舰队焚毁、皇座粉碎——而他自己也将在这场浩劫中被无辜压碎。这段预言精确地预示了全剧的悲剧走向。</p>",
    "interpretation": "<p><b>先知式独白</b>（Prophetische Rede）：从第48行\"Mir ahnts!\"起，帕皮尼安不再是理性的法学家，而化身为先知，以预言式的异象展示未来。这是塞涅卡悲剧传统中常见的\"预言独白\"模式，主人公在剧初便洞悉自己的命运，但无力改变。</p><p><b>\"Jammer-Spiel\"的元戏剧意味</b>：帕皮尼安将即将发生的悲剧称为 Jammer-Spiel（悲剧/惨剧），这恰好是巴洛克时期对悲剧（Trauerspiel）的另一种称呼。格律菲乌斯在此制造了元戏剧（Metadrama）效果：剧中人物预言了他自己所在之剧的类型。</p><p><b>\"doch ohne Schuld\"的斯多葛伦理</b>：最后一行括号中的\"虽无罪过\"是全篇独白的伦理核心。帕皮尼安清楚自己将因他人之罪而蒙难，但他选择坚持正义而非妥协求生——这正是斯多葛式的 constantia（坚定不移）。</p><p><b>罗穆路斯典故的延伸</b>：上节末尾提到的\"建在兄弟尸骸上的帝国\"在此得到延伸——既然罗马的根基就是兄弟相残，那么卡拉卡拉杀盖塔不过是这一原罪的重演。历史的循环论是巴洛克历史悲剧的核心观念。</p><p><b>排比异象的修辞力量</b>：第49–52行的四个并列结构（Faust im Haar / Stadt in noth / Länder in gefahr / Flott in brand / Thron zustücket / mich erdrücket）构成了一个急速下坠的意象序列——从个人暴力到帝国崩溃再到主人公的毁灭，层层递进，不可遏止。</p>",
    "translationNote": "<p><b>\"beyden\"</b>：= beiden，巴洛克拼写 ey→ei。指卡拉卡拉（Bassianus/Caracalla）与盖塔（Geta）两兄弟。</p><p><b>\"mänge\"</b>：= Menge（众多），巴洛克时期的元音拼写变体。</p><p><b>\"vorhin\"</b>：在早期近代德语中意为\"从前、以前\"（= vorher/zuvor），不完全等同于现代德语的\"刚才\"。此处可能暗指戴克里先（Diocletian）等分治帝国的先例。</p><p><b>\"deß\"</b>：= des（属格定冠词）。巴洛克拼写常用 ß 代替 s。</p><p><b>\"Nah\"</b>：= Nun/Na（好吧），语气词，表示让步转折。</p><p><b>\"Jammer-Spiel\"</b>：直译\"悲惨的戏剧\"，等同于 Trauerspiel（悲剧）。这个词在巴洛克戏剧理论中是正式的体裁名称。</p><p><b>\"es wil sich wittern\"</b>：非人称表达，= 风暴将至。wittern 原义为\"嗅到天气变化\"，此处为\"天气骤变\"之意。wil = will。</p><p><b>\"schaw\"</b>：= schaue（我看见），巴洛克拼写 aw→au。</p><p><b>\"deß Brudern\"</b>：= des Bruders（兄弟的），巴洛克弱变化名词属格形式。</p><p><b>\"zustücket\"</b>：= zerstückt（击碎），前缀 zu- 在早期近代德语中可替代 zer-，表示破坏。-et 为巴洛克过去分词/动词词尾。</p><p><b>\"durch eines Fall\"</b>：eines = 某一个人（不定代词属格），指盖塔之死。durch + Akk. = 由于、通过。</p>",
    "altTranslation": "<p><b>韵译尝试</b>：</p><p>难道不能共存于两者间？<br/>万邦大海乃至天下太窄浅？<br/>分治又如何——从前亦有先例在，<br/>血脉不能拘，就让山海来阻隔！<br/>罢了，和睦既无功，至少勿让<br/>罗马颤栗于此惨烈的悲剧场。<br/>我有预感！风暴即将来临——<br/>我已看见兄弟之拳揪兄弟发鬓，<br/>大城蒙难，各省岌岌危，<br/>舰队烈焰腾，皇座碎成灰，<br/>而我也将因一人之殒落——<br/>虽然无辜——被无情碾作尘埃。</p><p><b>注</b>：韵译在第49–52行的排比处加快节奏，以模仿原文意象急速堆叠的效果。\"碾作尘埃\"对应原文 erdrücket（压碎），兼含巴洛克 Vanitas（万物归于尘土）的意味。末行括号\"虽然无辜\"保留了原文插入语的突兀感与悲剧力量。</p>",

  {

    "lines": [
      {
        "de": "Doch klag ich Rom / nicht mich / ich scheue keinen Tod",
        "indent": false
      },
      {
        "de": "Den mir von langer Hand die Eisen-feste Noth",
        "indent": false
      },
      {
        "de": "An diese Seiten gab / man ließ vor vielen Zeiten",
        "indent": false
      },
      {
        "de": "Zu meinem Untergang den Werckzeug zubereiten.",
        "indent": false
      },
      {
        "de": "Verläumbdung schliff das Beil / das durch den Hals wird gehn",
        "indent": false
      },
      {
        "de": "Wenn mir der heiste Neid wird über Haupte stehn.",
        "indent": false
      },
      {
        "de": "Und hierumb hat man längst das Volck auff mich verhetzet /",
        "indent": false
      },
      {
        "de": "Und Lügen umbgestreut / und meinen Ruhm verletzet",
        "indent": false
      },
      {
        "de": "Der nach mir leben wird / man murmelt hir und dar:",
        "indent": false
      },
      {
        "de": "Man hält mich in Verdacht / und schätzt für wahr und klar",
        "indent": false
      },
      {
        "de": "Was Argwohn von mir dicht / die Läger sind beflecket /",
        "indent": false
      },
      {
        "de": "Die Kirchen nicht zu rein / der Rath selbst angestecket /",
        "indent": false
      },
      {
        "de": "Wer könt es denn nicht sehn daß meine Zeit außrinnt:",
        "indent": false
      },
      {
        "de": "Wenn jeder / Tag für Tag / mir zu verterben spinnt.",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "然而我哀叹的是罗马，非我自身——我不惧任何死亡，",
        "indent": false
      },
      {
        "text": "那铁铸般坚固的厄运早已",
        "indent": false
      },
      {
        "text": "从长远处向我逼来；人们早在许久以前",
        "indent": false
      },
      {
        "text": "便已备好毁灭我的工具。",
        "indent": false
      },
      {
        "text": "诽谤磨快了那斧刃——它终将落向我的脖颈，",
        "indent": false
      },
      {
        "text": "当那炽热的嫉妒凌驾于我头顶之时。",
        "indent": false
      },
      {
        "text": "正因如此，人们早已煽动民众来反对我，",
        "indent": false
      },
      {
        "text": "四处散播谎言，损伤我的声名——",
        "indent": false
      },
      {
        "text": "而那声名将在我身后长存；人们到处窃窃私语：",
        "indent": false
      },
      {
        "text": "人们猜忌我，把猜疑捏造之事",
        "indent": false
      },
      {
        "text": "视为确凿真相；说军营被我玷污，",
        "indent": false

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">Doch ich klag[e] Rom, nicht mich; ich scheue keinen Tod, den die eisen-feste Noth mir von langer Hand an diese Seiten gab; man ließ vor vielen Zeiten den Werckzeug zu meinem Untergang zubereiten. Die Verläumbdung schliff das Beil, das durch den Hals gehn wird, wenn der heiste Neid mir über [dem] Haupte stehn wird.</div><div class=\"syntax-gloss\">= 然而我悲叹罗马，不是我自己；我不畏惧那死亡——铁铸般的厄运早已从长远处把它派给了我；人们在很久以前就让毁灭我的工具被准备好了。诽谤磨快了那斧刃——当最炽热的嫉妒凌驾我头顶时，那斧刃将劈穿我的脖颈。</div></div>\n<p><b>klag</b> 省略了第一人称词尾 -e（巴洛克韵律需要）。<b>Den ... Noth ... gab</b> 是修饰 Tod 的关系从句，主语 Noth 和谓语 gab 被跨行分隔（Enjambement）。<b>von langer Hand</b> = 从长远处（成语，指有预谋地）。</p>\n<p>第61–68行为新的语义单元：<b>hierumb</b>（= hierum，因此）引出因果关系。<b>Der nach mir leben wird</b> 是修饰 Ruhm 的关系从句（\"那将在我死后继续存在的声名\"）。末尾 <b>Was Argwohn von mir dicht</b>（猜疑所捏造的东西）做宾语从句，承接 <b>schätzt für wahr und klar</b>。</p>",
    "meaning": "<p>帕皮尼安在此明确表态：他所悲叹的不是个人命运，而是罗马的命运。他清楚地知道死亡将至——这不是突如其来的灾难，而是早有预谋的迫害。</p>\n<p><b>\"Verläumbdung schliff das Beil\"</b>（诽谤磨快了斧刃）：诽谤被拟人化为刽子手的助手，暗中准备行刑的工具。这里\"Beil\"（斧头）既是实际的行刑工具，也象征语言暴力。</p>\n<p>第61–68行列举了敌人的手段：煽动民众、散布谣言、败坏声誉——同时指控他玷污军营、腐蚀教会和议会。帕皮尼安看穿了这一切，但无力阻止。末句 <b>\"mir zu verterben spinnt\"</b>（为毁灭我而编织阴谋）以纺纱/织网的隐喻收束，暗示阴谋如罗网般步步收紧。</p>",
    "interpretation": "<p>这一段是典型的巴洛克<b>殉道者独白</b>（Märtyrer-Monolog）：主人公已预见死亡，却不惧怕，反而以超然姿态审视命运。这呼应了斯多葛哲学的<b>坦然赴死</b>（Constantia）理想——格里菲乌斯深受利普修斯（Lipsius）新斯多葛主义影响。</p>\n<p><b>\"Doch klag ich Rom / nicht mich\"</b> 的对比结构（Antithese）是巴洛克修辞的核心手法。帕皮尼安将私人悲剧升华为公共关怀——他所代表的正义比个体生命更重要。</p>\n<p><b>Verläumbdung</b>（诽谤）和 <b>Neid</b>（嫉妒）的拟人化呼应了第三段（17–24行）中\"Verläumbdung\"和\"Neid\"的首次出现，形成主题上的回环。斧刃（Beil）的意象则预示了全剧的结局——帕皮尼安最终被斩首。</p>\n<p>格里菲乌斯通过帕皮尼安的口，隐喻了三十年战争期间德意志知识分子面对暴政的处境：真相被谣言淹没，正直之人被阴谋吞噬。</p>",
    "translationNote": "<p><b>拼写说明：</b>\"Noth\"= 现代 Not，\"Werckzeug\"= Werkzeug，\"Verläumbdung\"= Verleumdung，\"heiste\"= heißeste（最炽热的），\"hierumb\"= hierum（因此），\"auff\"= auf，\"umbgestreut\"= umgestreut，\"hir\"= hier，\"könt\"= könnte，\"außrinnt\"= ausrinnt，\"verterben\"= verderben。巴洛克德语中 ck→ck、th→t、mb→m 等拼写差异频繁出现。</p>\n<p><b>\"von langer Hand\"</b> 译为\"从长远处\"，这是德语成语 \"von langer Hand vorbereiten\"（长期预谋）的古形。</p>\n<p><b>\"Tag für Tag\"</b> 译为\"日复一日\"——这一插入语打断了诗行节奏，在朗诵中形成顿挫，强调时间的无情推进。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（七言对偶体）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">哀叹罗马非哀己，不畏死亡临眼前。(aa)<br>铁坚厄运久伏伺，长谋已在远年间。(bb)<br>诽谤磨斧刃如镜，嫉妒临头祸即连。(cc)<br>煽民散谣毁声誉，窃语纷纷满市廛。(dd)<br>军营教堂皆被诬，议会清名亦受牵。(ee)<br>末日时光如水逝，阴谋日日织成鞭。(ff)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>原文为 Alexandriner 对偶韵（aa bb），此处用七言古体模拟，每联押韵。14行原文浓缩为12句，有所删减。\"织成鞭\"对应原文 spinnt（纺织阴谋）。</div>",

    "lines": [
      {
        "de": "Was hab ich denn verwürckt? Unredliche Gemütter!",
        "indent": false
      },
      {
        "de": "Kommt Kläger! tretet vor! entdeckt wie herb und bitter",
        "indent": false
      },
      {
        "de": "Auch eure Zunge sey! Ich fliehe die gemein,",
        "indent": false
      },
      {
        "de": "(Sprecht jhr) und schliesse mich vor Freund und Frembden ein.",
        "indent": false
      },
      {
        "de": "Wahr ists daß ich bißher den Umbgang was beschnitten;",
        "indent": false
      },
      {
        "de": "Seid dem / daß ich mich muß vor Freund und Frembden hütten /",
        "indent": false
      },
      {
        "de": "Die / was mein offen Hertz freymütig von sich gibt /",
        "indent": false
      },
      {
        "de": "Das gar nicht schmeicheln kan und Falschheit nie gelibt /",
        "indent": false
      },
      {
        "de": "Verkehrt und gantz vergällt dem Fürsten zugetragen.",
        "indent": false
      },
      {
        "de": "Schämt ihr euch nicht mein Wort verkehrt mir nach zu sagen;",
        "indent": false
      },
      {
        "de": "So stört mein einsam seyn durch eur gereusche nicht.",
        "indent": false
      },
      {
        "de": "Mein Hof ist dennoch frey / ich halte stets Gericht /",
        "indent": false
      },
      {
        "de": "Geb' offentlich Verhör / auch wenn der lichte Morgen",
        "indent": false
      },
      {
        "de": "Den Himmel noch nicht siht / und sich der Tag verborgen.",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "我究竟犯了什么罪？你们这些不忠之徒！",
        "indent": false
      },
      {
        "text": "来吧，控告者们！站出来！让世人看看",
        "indent": false
      },
      {
        "text": "你们的舌头有多辛辣刻毒！（你们说）我逃避社交，",
        "indent": false
      },
      {
        "text": "把自己关在门内，不见亲朋与陌生人。",
        "indent": false
      },
      {
        "text": "不错，我确实减少了来往——",
        "indent": false
      },
      {
        "text": "因为我不得不提防那些亲朋与外人，",
        "indent": false
      },
      {
        "text": "他们把我坦荡的心坦率说出的话——",
        "indent": false
      },
      {
        "text": "那颗根本不会谄媚、从未爱过虚伪的心——",
        "indent": false
      },
      {
        "text": "歪曲了、变苦了，转告给了君王。",
        "indent": false
      },
      {
        "text": "你们难道不羞愧，歪曲我的话来中伤我？",
        "indent": false
      },
      {
        "text": "那就不要用你们的喧嚣来打扰我的独处。",
        "indent": false
      },
      {
        "text": "我的府邸仍然开放，我始终主持公堂，",
        "indent": false
      },
      {
        "text": "公开听审案件——哪怕在明亮的晨光",
        "indent": false
      },
      {
        "text": "尚未照见天空、白昼还在隐匿之时。",
        "indent": false
      }
    ],

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">Was hab ich denn verwürckt? [Ihr] unredliche[n] Gemütter! Kommt, Kläger! Tretet vor! Entdeckt, wie herb und bitter auch eure Zunge sey!</div><div class=\"syntax-gloss\">= 我到底做错了什么？你们这些不正直的人！来吧，控告者！站出来！让人们看到你们的舌头有多刻毒！</div></div>\n<p>开头三个祈使句（Kommt! tretet vor! entdeckt!）形成三叠排比（Trikolon），气势逼人。</p>\n<p>第73–77行是本段最复杂的长句，还原语序为：<b>Seid dem, daß ich mich vor Freund und Frembden hütten muß, die [das], was mein offen Hertz (das gar nicht schmeicheln kan und Falschheit nie gelibt [hat]) freymütig von sich gibt, verkehrt und gantz vergällt dem Fürsten zugetragen [haben].</b></p>\n<p>= 自从我不得不提防那些朋友和陌生人——他们把我坦荡之心（那根本不会谄媚、从未爱过虚伪的心）坦率说出的话，歪曲了、变苦了，转告给了君王——（以来，我便减少了交往）。</p>\n<p>这是一个四层嵌套的复合句：主句 → daß 从句 → die 关系从句 → was 关系从句内嵌 das 关系从句。</p>",
    "meaning": "<p>帕皮尼安对指控者发出正面质问：我到底犯了什么罪？他先引述敌人的指控——\"你逃避社交\"——然后逐条反驳。</p>\n<p>他承认确实减少了交往，但给出了正当理由：因为那些所谓的\"朋友\"把他坦诚的话歪曲后告到了君王那里。这里揭示了宫廷政治的核心悖论：<b>坦诚反而成为罪证</b>，因为谄媚之徒会把直言扭曲为冒犯。</p>\n<p>末四行是有力的自辩：他的府邸仍然开放，他仍在主持正义——甚至在天亮之前就开始审案。这表明他的\"独处\"不是怠政，而是<b>自我保护</b>；他的勤勉有目共睹。</p>",
    "interpretation": "<p>这一段展现了巴洛克悲剧中常见的<b>法庭修辞</b>（Gerichtsrede）模式：帕皮尼安既是被告，也充当自己的辩护律师。\"Was hab ich denn verwürckt?\"是典型的修辞性问句（rhetorische Frage），不求回答，而是要暴露指控的荒谬。</p>\n<p><b>\"mein offen Hertz\"</b>（我坦荡的心）与 <b>\"Falschheit\"</b>（虚伪）形成对比，这是巴洛克核心主题之一：<b>Sein und Schein</b>（真实与假象）。帕皮尼安代表\"真\"，他的敌人代表\"假\"。</p>\n<p>第73–77行的极端复合句结构本身就是修辞策略：层层嵌套的从句模拟了宫廷阴谋的层层包裹——话从帕皮尼安口中说出，经过歪曲、添毒，最终以面目全非的形态到达君王耳中。句法的复杂性即是政治阴谋复杂性的语言化身。</p>\n<p>末尾 <b>\"der lichte Morgen / Den Himmel noch nicht siht\"</b>（明亮晨光尚未照见天空）是精妙的矛盾修辞（Oxymoron）：晨光已存在但尚未可见——正如帕皮尼安的正义已存在但尚未被承认。</p>",
    "translationNote": "<p><b>拼写说明：</b>\"verwürckt\"= verwirkt，\"Gemütter\"= Gemüter，\"jhr\"= ihr，\"Frembden\"= Fremden，\"bißher\"= bisher，\"hütten\"= hüten，\"freymütig\"= freimütig，\"gelibt\"= geliebt，\"gantz\"= ganz，\"gereusche\"= Geräusch，\"eur\"= euer，\"offentlich\"= öffentlich，\"siht\"= sieht。</p>\n<p><b>\"Seid dem\"</b> = 现代 \"Seitdem\"（自从），巴洛克拼写将介词 seit 写作 seid。</p>\n<p><b>\"was beschnitten\"</b> 中的 \"was\" = etwas（有些），副词用法，意为\"有所削减\"。</p>\n<p><b>\"die gemein\"</b> 此处不是形容词\"卑鄙的\"，而是名词 die Gemein(de) = 社群、公共交往，注意与现代德语 gemein（卑鄙）的语义差异。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（七言对偶体）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">我罪何在告我来，且看尔舌毒如苔。(aa)<br>避世因防口蜜辈，直言反被送君台。(bb)<br>扭曲忠心呈苦胆，歪传正语作尘埃。(cc)<br>莫扰孤居仍理政，晨星未落已升阶。(dd)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>原文14行浓缩为8句，每联押韵（-ai 韵贯穿）。\"送君台\"= 转告给君王，\"晨星未落已升阶\"= 天不亮就上堂审案。</div>",

    "lines": [
      {
        "de": "Ich fahre keine Witt'b mit rauen Worten an /",
        "indent": false
      },
      {
        "de": "Ich helffe wo ich mag / den ich nicht retten kan",
        "indent": false
      },
      {
        "de": "Laß ich doch sonder Trost nicht von dem Angesichte /",
        "indent": false
      },
      {
        "de": "Und klage wenn ich nicht / was jemand wüntscht / verrichte.",
        "indent": false
      },
      {
        "de": "Man gibt mir ferner Schuld daß ich der Götter Ehr",
        "indent": false
      },
      {
        "de": "Als auß den Augen setz' und nicht der Christen Lehr",
        "indent": false
      },
      {
        "de": "Mit Flamm' und Schwerdt außreut'. Ists aber wol zu loben",
        "indent": false
      },
      {
        "de": "Daß man so grimmig wil auff dise Leute toben /",
        "indent": false
      },
      {
        "de": "Und Leich auff Leichen häufft da niemand recht erkennt",
        "indent": false
      },
      {
        "de": "Was ihr Verbrechen sey? Wer jetzund Christen nennt",
        "indent": false
      },
      {
        "de": "Wil stracks daß man zur Qual auch ohn erforschen eile /",
        "indent": false
      },
      {
        "de": "Da doch das heilge Recht gesetzte Zeit und Weile",
        "indent": false
      },
      {
        "de": "Beym Blut-gericht' erheischt! man strafft / ich weiß nicht was /",
        "indent": false
      },
      {
        "de": "Und schir ich weiß nicht wie / welch Recht spricht billich das;",
        "indent": false
      },
      {
        "de": "Daß man ein erbar Weib der Unzucht übergebe",
        "indent": false
      },
      {
        "de": "Und in ein offen Haus auß ihrem Zimmer hebe /",
        "indent": false
      },
      {
        "de": "Umb daß sie Christum liebt. Ist das die Röm'sche Zucht?",
        "indent": false
      },
      {
        "de": "Ist diß ein neues Recht: So sey diß Recht verflucht!",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "我不曾用粗暴言辞训斥任何寡妇，",
        "indent": false
      },
      {
        "text": "我尽力帮助所有人——那些我无力救助的，",
        "indent": false
      },
      {
        "text": "我也不会让他们不带安慰地离开我面前，",
        "indent": false
      },
      {
        "text": "若我做不到他人所愿，我便为此忧伤。",
        "indent": false
      },
      {
        "text": "人们还指控我，说我漠视神灵的荣耀，",
        "indent": false
      },
      {
        "text": "不以烈焰和利剑",
        "indent": false
      },
      {
        "text": "铲除基督徒的教义。但这难道值得称赞——",
        "indent": false
      },
      {
        "text": "如此凶残地向这些人发泄暴怒，",
        "indent": false
      },
      {
        "text": "尸体堆叠在尸体上，却无人真正知晓",
        "indent": false
      },
      {
        "text": "他们的罪行是什么？谁一提到基督徒",
        "indent": false
      },
      {
        "text": "就立刻要人不经审查便赶去用刑，",
        "indent": false
      },
      {
        "text": "而神圣的法律在血案审判中",
        "indent": false
      },
      {
        "text": "要求有足够的时间和程序！人们惩罚的——我不知是何罪——",
        "indent": false
      },
      {
        "text": "以我不知怎样的方式——什么法律竟公正地判定：",
        "indent": false
      },
      {
        "text": "把一个正派的妇人交给淫秽之辱，",
        "indent": false
      },
      {
        "text": "把她从自己的闺房送入妓院，",
        "indent": false
      },
      {
        "text": "只因她爱基督。这就是罗马的教化吗？",
        "indent": false
      },
      {
        "text": "这若是新的律法——那就让它被诅咒！",
        "indent": false
      }

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">Ich fahre keine Witt'b mit rauen Worten an. Ich helffe, wo ich mag; den, [den] ich nicht retten kan, laß ich doch nicht sonder Trost von dem Angesichte [gehen].</div><div class=\"syntax-gloss\">= 我不用粗暴言辞训斥任何寡妇。我在能帮之处便帮；那些我不能救助的人，我也不让他们不带安慰便离开我面前。</div></div>\n<p>第83–86行由四个并列的第一人称陈述构成，形成排比（Parallelismus），展示帕皮尼安的仁政。</p>\n<p>第87–89行还原：<b>Man gibt mir ferner Schuld, daß ich der Götter Ehr als aus den Augen setz[e] und der Christen Lehr nicht mit Flamm' und Schwerdt außreut[e].</b>（= 人们还指控我，说我仿佛漠视神灵的荣耀，不以烈焰和利剑铲除基督徒的教义。）\"als\"在此意为\"仿佛\"（gleichsam）。</p>\n<p>第95–96行是修辞高潮：<b>\"man strafft, ich weiß nicht was, und schir ich weiß nicht wie\"</b>——两个\"ich weiß nicht\"插入语打断句法，模拟了帕皮尼安面对暴行的惶惑和愤怒。</p>\n<p>末尾 <b>\"So sey diß Recht verflucht!\"</b> 是虚拟式（Konjunktiv I），表达愿望/诅咒：\"那就让这律法被诅咒吧！\"</p>",
    "meaning": "<p>本段分两部分：第一部分（83–86行）自辩其<b>仁政</b>——善待寡妇、帮助弱者、不让求助者空手而归；第二部分（87–100行）转入最严厉的控诉——反对<b>基督徒迫害</b>。</p>\n<p>帕皮尼安不否认基督徒的存在，但质问迫害的合法性：没有人真正知道他们犯了什么罪（\"niemand recht erkennt / Was ihr Verbrechen sey\"），仅凭一个\"基督徒\"的名号就要立即用刑。这违反了罗马法最基本的原则——正当程序（\"gesetzte Zeit und Weile / Beym Blut-gericht'\"）。</p>\n<p>最后四行达到情感顶峰：一个正派的已婚妇女仅因信仰基督而被送入妓院。<b>\"offen Haus\"</b>（字面意思\"敞开的房屋\"）是妓院的委婉语。帕皮尼安以两个修辞问句和一句诅咒收束：\"这就是罗马的教化吗？这若是新法——那就让它受诅咒！\"</p>",
    "interpretation": "<p>这一段是全独白中最具历史隐喻意义的部分。表面上，帕皮尼安在为罗马基督徒辩护；实际上，格里菲乌斯借古讽今——他影射的是<b>三十年战争中的宗教迫害</b>。作为虔诚的路德宗新教徒，格里菲乌斯亲历了西里西亚的反宗教改革运动，目睹新教徒被迫害、教堂被关闭。</p>\n<p><b>\"Leich auff Leichen\"</b>（尸体堆叠尸体）的叠词法（Geminatio）制造了触目惊心的画面感。<b>\"man strafft / ich weiß nicht was / Und schir ich weiß nicht wie\"</b> 中两次\"ich weiß nicht\"表达的不是真的不知道，而是<b>修辞性的困惑</b>——面对暴行的荒谬，连语言都失去了表达能力。</p>\n<p>基督徒妇女被送入妓院的情节不是虚构：这是对罗马帝国迫害基督徒的真实刑罚之一（参见Eusebius《教会史》中的记载）。格里菲乌斯将法律问题（正当程序）与道德问题（以淫辱惩罚贞洁）并置，构成双重控诉。</p>\n<p>末句 <b>\"So sey diß Recht verflucht!\"</b> 打破了帕皮尼安此前理性自辩的语调，爆发出先知式的诅咒——这是巴洛克悲剧中<b>从斯多葛式隐忍到旧约式义怒</b>的典型转折。</p>",
    "translationNote": "<p><b>拼写说明：</b>\"Witt'b\"= Witwe（寡妇），\"helffe\"= helfe，\"wüntscht\"= wünscht，\"Schwerdt\"= Schwert，\"außreut'\"= ausreutet/ausrottet，\"dise\"= diese，\"Leich\"= Leiche，\"jetzund\"= jetzt（现在），\"ohn\"= ohne，\"heilge\"= heilige，\"Beym\"= Beim，\"schir\"= schier（几乎），\"billich\"= billig（公正地），\"erbar\"= ehrbar，\"Umb\"= Um，\"diß\"= dies/dieses，\"Röm'sche\"= Römische。</p>\n<p><b>\"billich\"</b>：现代德语 billig 意为\"便宜\"，但在巴洛克时代其主要含义是\"公正、合理\"（= billigerweise）。此处\"welch Recht spricht billich das\"意为\"什么法律会公正地如此判决\"——这是反讽。</p>\n<p><b>\"offen Haus\"</b> 直译\"敞开的房屋\"，实为<b>妓院</b>的委婉说法。翻译中需要明确这一含义，否则读者可能无法理解为何\"离开闺房、进入敞开的房屋\"是一种惩罚。</p>\n<p><b>\"sonder\"</b> = ohne，是中古高地德语残存的介词，在巴洛克诗歌中仍常见。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">押韵尝试版（七言对偶体）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">善待孀妇言温煦，济人无力亦殷勤。(aa)<br>更责我纵容异教，不以刀火灭其人。(bb)<br>何罪未明堆白骨，酷刑不审即加身？(cc)<br>神圣法典须审慎，谁许草菅化至亲？(dd)<br>贞妇投入淫秽所，只因信主便蒙尘。(ee)<br>若此新法堪称义，便叫此法永沉沦！(ff)</div></div><div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>韵式说明：</b>原文18行浓缩为12句。\"孀妇\"= 寡妇（Witt'b）。\"投入淫秽所\"= 送入妓院（in ein offen Haus）。末句呼应原文 \"So sey diß Recht verflucht!\" 的诅咒语气。全篇押 -in/-un 韵，模拟原文对偶韵结构。</div>",

  {
    "id": 10,
    "lines": [
      {
        "de": "Man wirfft mir weiter vor daß ich der Fürsten rasen",
        "indent": false
      },
      {
        "de": "Und grimme Zwytracht stärck' und Flammen helff' auffblasen /",
        "indent": false
      },
      {
        "de": "Die ich mit meinem Blut zu dämpffen willig bin.",
        "indent": false
      },
      {
        "de": "Nim grosse Themis nim den Schandfleck von mir hin!",
        "indent": false
      },
      {
        "de": "Ich der die gantze Zeit auch mit gefahr deß Lebens",
        "indent": false
      },
      {
        "de": "Den Bassian gehemmt / den Antonin vergebens",
        "indent": false
      },
      {
        "de": "Zu Freundschafft anermahnt / werd' umb ein Stück verdacht /",
        "indent": false
      },
      {
        "de": "Drob sich mein Geist entsetzt. Wer hiß der Läger macht",
        "indent": false
      },
      {
        "de": "Den Brüdern in gemein den theuren Eid ablegen?",
        "indent": false
      },
      {
        "de": "Noch gleichwol wolt ich sie zu theilen nechst bewegen!",
        "indent": false
      },
      {
        "de": "Ihr Götter dieses Reichs! wofern bey solchem Stand",
        "indent": false
      },
      {
        "de": "Mein Rath auß Boßheit kam so waffnet eure Hand",
        "indent": false
      },
      {
        "de": "Mit Blitzen wider mich / und last es nicht geschehen",
        "indent": false
      },
      {
        "de": "Daß ich mein eigen Haus muß ausser Zweytracht sehen!",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "人们进而指控我，说我煽动诸侯的疯狂，",
        "indent": false
      },
      {
        "text": "助长残酷的纷争，将火焰越吹越旺——",
        "indent": false
      },
      {
        "text": "而那火焰，我甘愿以自己的鲜血扑灭。",
        "indent": false
      },
      {
        "text": "伟大的忒弥斯啊，请除去我身上的耻辱！",
        "indent": false
      },
      {
        "text": "我——始终冒着生命危险——",
        "indent": false
      },
      {
        "text": "阻止了巴西安努斯，徒劳地劝说安东尼努斯",
        "indent": false
      },
      {
        "text": "归于友爱，却因一桩事而遭受猜疑——",
        "indent": false
      },
      {
        "text": "这令我的灵魂惊骇。是谁命令军营的力量",
        "indent": false
      },
      {
        "text": "让兄弟二人共同宣誓那庄严的誓言？",
        "indent": false
      },
      {
        "text": "尽管如此，我最近还试图说服他们分治！",
        "indent": false
      },
      {
        "text": "此帝国的诸神啊！倘若在此情形之下",
        "indent": false
      },
      {
        "text": "我的忠告出于恶意，那就用你们的手",
        "indent": false
      },
      {
        "text": "以闪电击我吧，莫让此事发生——",
        "indent": false
      },
      {
        "text": "让我亲眼目睹自己的家园陷于纷争之外！",
        "indent": false
      }
    ],

    "syntax": "<p><b>101–103 还原语序：</b><br>\nMan wirfft mir weiter vor, daß ich der Fürsten Rasen und grimme Zwytracht stärck(e) und (daß ich) Flammen helff(e) auffzublasen, die ich mit meinem Blut zu dämpffen willig bin.</p>\n<p><b>句法分析：</b>主句 Man wirfft mir vor（人们指责我），后接 daß 从句作宾语，内含两个并列谓语 stärck(e) 和 helff(e) auffblasen。die 引导关系从句修饰 Flammen，其中 zu dämpffen 是不定式结构。注意巴洛克德语中虚拟式一式（Konjunktiv I）的使用：stärck' = stärke, helff' = helfe，表示间接引述。</p>\n<p><b>104 还原语序：</b><br>\nGrosse Themis, nim den Schandfleck von mir hin!</p>\n<p><b>句法分析：</b>祈使句，呼唤正义女神忒弥斯。hinnehmen 为可分动词，此处 nim … hin 意为「拿走」。</p>\n<p><b>105–108a 还原语序：</b><br>\nIch, der (ich) die gantze Zeit, auch mit Gefahr deß Lebens, den Bassian gehemmt (habe) / den Antonin vergebens zu Freundschafft anermahnt (habe), werd(e) umb ein Stück verdacht, drob sich mein Geist entsetzt.</p>\n<p><b>句法分析：</b>长句，主语 Ich 后接关系从句 der … gehemmt / anermahnt（用完成时省略助动词 habe），主句谓语 werde … verdacht（被猜疑）。drob = darob（因此），引导后续分句。Bassian 和 Antonin 分别指卡拉卡拉和盖塔两位皇帝。</p>\n<p><b>108b–109 还原语序：</b><br>\nWer hiß der Läger Macht, den Brüdern in gemein den theuren Eid ablegen?</p>\n<p><b>句法分析：</b>修辞性反问句。hiß = hieß（命令）。der Läger Macht = die Macht der Lager（军营的力量），为属格前置。ablegen 为可分动词，带不定式结构。</p>\n<p><b>110 还原语序：</b><br>\nNoch gleichwol wolt(e) ich sie nechst zu theilen bewegen!</p>\n<p><b>句法分析：</b>让步转折句。gleichwol = gleichwohl（尽管如此）。nechst = nächst（最近）。zu theilen bewegen = dazu bewegen, zu teilen（说服分治）。</p>\n<p><b>111–114 还原语序：</b><br>\nIhr Götter dieses Reichs! Wofern mein Rath bey solchem Stand auß Boßheit kam, so waffnet eure Hand mit Blitzen wider mich, und last es nicht geschehen, daß ich mein eigen Haus ausser Zweytracht sehen muß!</p>\n<p><b>句法分析：</b>条件句式 wofern … so …（如果……那么……）。wofern = sofern（如果）。waffnen 带双宾：eure Hand（直接宾语）和 mit Blitzen（工具状语）。最后 daß 从句为 es 的具体内容（形式宾语结构）。ausser Zweytracht = außer Zwietracht，此处意为「处于纷争之外」，即看到自家免于纷争——反语，意为「使我家也不能幸免」。</p>",
    "meaning": "<p>帕比尼安驳斥对他「煽动叛乱」的指控。他声明：人们指责他助长两位皇帝之间的疯狂与纷争，而事实上他甘愿以鲜血扑灭这场大火。他呼唤正义女神忒弥斯洗清他的冤屈。</p>\n<p>他回顾自己始终冒着生命危险阻止巴西安努斯（卡拉卡拉）的暴行，徒劳地劝说安东尼努斯（盖塔）与兄长和好，反而因此被怀疑参与阴谋——这令他心寒。他用反问质问：是谁命令禁卫军让两兄弟共同宣誓？暗示这并非他的主意。</p>\n<p>尽管如此，他仍试图劝说两兄弟分治帝国。最后他向帝国诸神起誓：如果他的建议出于恶意，就请以闪电劈他——绝不让自己的家免于纷争的惩罚。这是一个极其有力的自我辩护与赌咒发誓。</p>",
    "interpretation": "<p><b>修辞手法：</b>本段密集运用巴洛克法庭辩论修辞。帕比尼安以法学家的专业身份为自己辩护，结构严谨：先陈述指控（101–103），再呼唤神明（104），继而列举反证（105–110），最后以神明赌咒收束（111–114）。</p>\n<p><b>呼唤忒弥斯：</b>忒弥斯（Themis）是希腊正义与法律女神。帕比尼安身为罗马最伟大的法学家之一，呼唤正义女神为自己作证，具有强烈的象征意义——法律本身为法律的守护者作证。</p>\n<p><b>历史背景：</b>巴西安（Bassianus）是卡拉卡拉的本名，安东尼（Antoninus）是盖塔的帝号。两兄弟自塞维鲁去世后争权不休。帕比尼安作为禁卫军长官（Praefectus Praetorio），确实曾试图调和二人，最终因拒绝为卡拉卡拉弑弟辩护而被杀。</p>\n<p><b>赌咒誓言：</b>111–114 行采用经典的条件式赌咒（conditional self-curse），即「若我有罪，则天罚我」。这一修辞形式在古典悲剧中极为常见（如索福克勒斯《俄狄浦斯王》），此处呼应了帕比尼安的古罗马身份与悲剧英雄地位。</p>",
    "translationNote": "<p><b>\"der Fürsten rasen\"：</b>rasen 此处为名词化动词（das Rasen），「诸侯的疯狂」。巴洛克德语中动词名词化常不加冠词。</p>\n<p><b>\"stärck' / helff'\"：</b>虚拟式一式省音形式，stärke → stärck'，helfe → helff'，表示间接引述中的语气。</p>\n<p><b>\"Den Bassian gehemmt / den Antonin … anermahnt\"：</b>两个完成时分词短语省略助动词 habe，这是巴洛克诗歌中常见的省略手法，以适应亚历山大格的音步限制。</p>\n<p><b>\"umb ein Stück verdacht\"：</b>Stück 此处意为「一件事、一桩阴谋」（非「一块」的现代义），verdacht = verdächtigt（被怀疑），古德语中 verdacht 可直接作被动分词。</p>\n<p><b>\"der Läger macht\"：</b>Läger = Lager 的巴洛克变体拼写。der Läger Macht = die Macht der Lager，属格前置结构。</p>\n<p><b>\"ausser Zweytracht\"：</b>ausser = außer。此句理解有歧义：可解为「不得不看到自己的家处于纷争之外（即免受惩罚）」，是对诸神的反语请求——若有罪就连家也不放过。</p>",
    "altTranslation": "<p><b>韵译尝试（七言排律风格）：</b></p>\n<p>\n人言我纵群侯乱，<br>\n煽火扬灰助祸端。<br>\n此焰吾甘倾血灭，<br>\n正义女神鉴我冤！<br>\n冒死阻拦巴西暴，<br>\n苦劝安敦归睦欢。<br>\n反遭猜忌因何事？<br>\n此令孤魂胆亦寒。<br>\n谁令军营齐立誓？<br>\n犹劝兄弟各分藩。<br>\n帝国诸神如在上，<br>\n若吾奸计出心肝——<br>\n请将雷霆加我首，<br>\n勿使吾家免祸患！\n</p>\n<p><b>注：</b>原诗十四行亚历山大格（六步抑扬格），韵式 aa bb。此韵译以七言近体形式传达法庭辩护的慷慨陈词，兼顾典故与气势。「巴西」「安敦」为 Bassianus、Antoninus 的汉译简称。末联赌咒格式对应原文条件式誓言。</p>",

    "syntax": "<p><b>115–116 还原语序：</b><br>\nNoch ferner sprengt man auß, als (ob) ich nach dem Thron ring(e) und (als ob ich) auß diesem Zwist der Antoninen Kron such(e).</p>\n<p><b>句法分析：</b>主句 sprengt man auß（人们散布），后接 als 引导的虚拟比较从句（als ob 省略 ob），内含两个并列谓语 ringe 和 suche（均为虚拟式一式省音形式）。der Antoninen Kron = die Krone der Antoninen，属格前置。</p>\n<p><b>117–118 还原语序：</b><br>\nRasende, fahrt fort, (mir) also nachzustellen; so wird die Lügen selbst in eurem Mund erhällen.</p>\n<p><b>句法分析：</b>祈使句，带反讽语气。fahrt fort 为可分动词 fortfahren 的命令式复数。also = auf diese Weise（如此）。so 引导结果句：谎言将在你们自己口中回响。die Lügen 此处为单数阴性（巴洛克德语中 die Lüge 有时写作 die Lügen 但仍为单数）。</p>\n<p><b>119–120 还原语序：</b><br>\nHat die Aufflag(e) in mir wol irgends einen Schein? Kommt mein Leben auch mit dem Anschlag überein?</p>\n<p><b>句法分析：</b>两个平行的修辞性反问句。irgends = irgendwo/irgends（在任何地方）。übereinkommen 为可分动词，意为「一致，相符」。</p>\n<p><b>121–122 还原语序：</b><br>\nWen hab ich umgekaufft, das Werck mit mir zu wagen? Wem (hab ich) die Verrätherey, den Meyneid vorgetragen?</p>\n<p><b>句法分析：</b>两个平行反问句，第二句省略助动词 habe。vortragen 为可分动词，意为「提议，建议」。das Werck mit mir zu wagen = um das Werk mit mir zu wagen，带目的不定式。</p>\n<p><b>123–124 还原语序：</b><br>\nHab ich das Läger je zu meinem Dienst ersucht? Kan mein(e) Einsamkeit diß (beweisen)? Kan der Freunde Flucht diß (beweisen)?</p>\n<p><b>句法分析：</b>三个连续反问。ersuchen 此处意为「请求，征召」。124行使用省略法（Ellipse），Kan diß = Kann dies (beweisen)，反复使用 Kan diß 构成修辞性排比（Anapher）。</p>\n<p><b>125–128 还原语序：</b><br>\nSind mir die fernen Reich(e) und (die) eingetheilten Waffen mit Pflichten zugethan? So kommt, ergrimmte Straffen, und fodert mich zur Pein! Ist es denn ein eitel(er) Wahn? Warumb bedenckt man nicht, was ich bißher gethan (habe)?</p>\n<p><b>句法分析：</b>zugethan = zugetan（忠诚的），mit Pflichten = 以义务/效忠。So kommt 转为对拟人化「惩罚」（ergrimmte Straffen）的呼唤。末两行转为总结性反问：如果一切指控都是空虚的妄想（eitel wahn），为何不考虑我过去的所作所为？</p>",
    "meaning": "<p>帕比尼安反驳最严重的指控——觊觎皇位。他揭示谣言的荒谬：人们说他想从安东尼兄弟的内斗中窃取皇冠。他以反讽语气说：疯狂的人啊，尽管继续吧，谎言终将在你们自己口中回荡。</p>\n<p>接着他以一连串修辞性反问逐一拆解指控的每一个要素：这指控有任何可信度吗？我的生平与此阴谋相符吗？我收买过谁？我向谁提议过叛变和伪誓？我何曾寻求军营支持？我的孤独、朋友的离去——这些像是一个阴谋家的表现吗？远方的行省和军队对我效忠吗？</p>\n<p>最后他发出悲愤的呼喊：既然如此，那就让惩罚来吧！如果这一切不过是虚妄的幻想，为什么没有人考虑我迄今为止的忠诚作为？</p>",
    "interpretation": "<p><b>法庭辩论的高潮：</b>本段是帕比尼安自辩的核心部分。与第10段反驳「煽动叛乱」的指控不同，此处他面对的是最危险的罪名——谋反篡位（Hochverrat / crimen maiestatis）。他采用古典修辞学中的反证法（refutatio），通过连续反问（rhetorical questions）逐条瓦解控方论点。</p>\n<p><b>排比反问（Anaphora + Rhetorical Questions）：</b>119–124行的六个连续反问句构成了密集的修辞排比，从「外在证据」（Schein）、「内在品行」（Leben）、「同谋」（umgekauft）、「提议」（vorgetragen）、「军事支持」（Läger）到「人际关系」（Einsamkeit / Freunde Flucht），形成完整的反驳链条。这是典型的西塞罗式法庭辩护术。</p>\n<p><b>\"eitel wahn\"——巴洛克核心主题：</b>eitel（空虚的、虚幻的）是巴洛克文学的关键词，格里菲乌斯在《一切皆空》（Es ist alles eitel）中将其推向极致。此处 eitel wahn（虚妄）既指控方指控的荒谬，也隐含巴洛克式的存在主义忧虑——一切权力与荣耀终归虚无。</p>\n<p><b>悲剧性反讽：</b>帕比尼安在117行说「尽管继续迫害我吧」，读者/观众已知他最终确实将被处死。这种戏剧性反讽（dramatic irony）加深了悲剧的力量——正义者的自辩注定徒劳，真相无法阻止暴政。</p>",
    "translationNote": "<p><b>\"sprengt man auß\"：</b>aussprengen 意为「散布谣言」，此义今已罕用。巴洛克拼写 auß = aus。</p>\n<p><b>\"als ring' ich\"：</b>als 此处等于 als ob（仿佛），省略 ob 后动词用虚拟式（ring' = ringe，Konjunktiv I）。这是巴洛克德语中常见的省略。</p>\n<p><b>\"rasende\"：</b>形容词名词化，die Rasenden = 疯狂的人们。此处呼格用法（Vokativ），直接称呼对手。</p>\n<p><b>\"erhällen\"：</b>巴洛克拼写 erhällen = erhallen（回响）。此处含双重含义：谎言不仅会「回响」，也暗示会「暴露」。</p>\n<p><b>\"Aufflag\"：</b>巴洛克词形 Aufflag = Auflage，此处为法律术语「指控、控告」（Anklage），非现代德语中「版次、印数」之义。</p>\n<p><b>\"Kan diß mein' Einsamkeit?\"：</b>高度省略的句式，完整为 Kann meine Einsamkeit dies (beweisen)?（我的孤独能证明这一点吗？）。mein' = meine，省音以适应韵律。</p>\n<p><b>\"ergrimmte Straffen\"：</b>Straffen = Strafen（惩罚），此处拟人化为可被呼唤的存在。ergrimmte = 愤怒的。</p>\n<p><b>\"fodert\"：</b>巴洛克拼写 fodert = fordert（要求、召唤）。</p>",
    "altTranslation": "<p><b>韵译尝试（七言排律风格）：</b></p>\n<p>\n又闻人说我图皇，<br>\n欲借兄仇夺冕裳。<br>\n狂徒尽管相追逼，<br>\n谎语终当自口彰。<br>\n此控于吾何足信？<br>\n平生岂与此谋当？<br>\n收买何人同共险？<br>\n向谁曾议叛和殇？<br>\n军营可曾为吾用？<br>\n孤身友散证何方？<br>\n远省分兵谁效命？<br>\n那便来罢怒刑章——<br>\n若皆虚妄空中影，<br>\n何不思量旧日光？\n</p>\n<p><b>注：</b>原诗十四行亚历山大格，韵式 aa bb。此韵译以七言排律传达连珠反问的法庭辩论气势。「冕裳」对应 Kron（王冠），「叛和殇」对应 Verrätherey 和 Meyneid。末联「旧日光」喻指帕比尼安往昔的忠诚功绩。</p>",

  {
    "id": 12,
    "lines": [
      {
        "de": "Gilt ein vergiffter Mund mehr als ein rein Gemüte;",
        "indent": false
      },
      {
        "de": "So fege frembder Schuld mein unbefleckt Geblüte.",
        "indent": false
      },
      {
        "de": "Und diß wird nun mein Lohn; daß ich so manche Nacht",
        "indent": false
      },
      {
        "de": "Entfernt von süsser Ruh / in Sorgen durchgebracht /",
        "indent": false
      },
      {
        "de": "Daß ich so manchen Tag Staub / Sonn und Frost getragen",
        "indent": false
      },
      {
        "de": "Daß ich auff See und Land behertzt den Leib zu wagen",
        "indent": false
      },
      {
        "de": "Mein und der Feinde Blut auff dieser Brust vermischt /",
        "indent": false
      },
      {
        "de": "Durch meiner Glieder Schweiß der Länder Angst erfrischt /",
        "indent": false
      },
      {
        "de": "Der Parthen Macht gestützt / den Nil und Phrat gezwungen /",
        "indent": false
      },
      {
        "de": "Den stoltzen Rhein umbpfählt / den Balth ans Joch gedrungen /",
        "indent": false
      },
      {
        "de": "Der Römer Recht erklärt / der Fürsten Schatz erfüllt /",
        "indent": false
      },
      {
        "de": "Der Läger Trotz gezäumt / der Völcker Sturm gestillt /",
        "indent": false
      },
      {
        "de": "Die Stadt in Hungers-Noth mit Ostens Korn gespeiset /",
        "indent": false
      },
      {
        "de": "Jetzt West / jetzt wüsten Sud / und rauhen Nord durchreiset /",
        "indent": false
      },
      {
        "de": "Dort Schantzen hin gesetzt / hir Mauren auffgebaut /",
        "indent": false
      },
      {
        "de": "Hier Thamm und Wahl gesänckt / und wo dem Frieden graut /",
        "indent": false
      },
      {
        "de": "Der Britten rauhe Ströhm' und Klippen-reiche Wellen",
        "indent": false
      },
      {
        "de": "Mit Brücken überlegt / nie vor erkante Quällen",
        "indent": false
      },
      {
        "de": "Den Arabern entdeckt / mein Leben in Gefahr",
        "indent": false
      },
      {
        "de": "Für Freyheit deines Raths / O Rom / und dein Altar",
        "indent": false
      },
      {
        "de": "Schir Tag für Tag gewagt / mir nichts zu schwer geschätzet /",
        "indent": false
      },
      {
        "de": "Durch eignen Guts Verlust / gemeines Best' ergetzet /",
        "indent": false
      },
      {
        "de": "Der Feinde List entdeckt / und Frembd' in Bündnüß bracht /",
        "indent": false
      },
      {
        "de": "Verjagt' ins Reich versetzt / und die verschworne Macht",
        "indent": false
      }
    ],
    "cn": [
      {
        "text": "若一张淬毒的嘴比纯洁的心灵更有分量，",
        "indent": false
      },
      {
        "text": "那就让他人的罪孽来洗涤我无瑕的血脉。",
        "indent": false
      },
      {
        "text": "而这便是我如今的报偿——我度过了多少个夜晚",
        "indent": false
      },
      {
        "text": "远离甜美的安眠，在忧虑中苦熬到天明；",
        "indent": false
      },
      {
        "text": "我忍受了多少日的尘土、烈日与严霜，",
        "indent": false
      },
      {
        "text": "在海上陆上奋不顾身地将性命孤注，",
        "indent": false
      },
      {
        "text": "在这胸膛上混合了自己和敌人的鲜血，",
        "indent": false
      },
      {
        "text": "以四肢的汗水浇灭了各省的恐慌，",
        "indent": false
      },
      {
        "text": "支撑了帕提亚人的势力，征服了尼罗河与幼发拉底河，",
        "indent": false
      },
      {
        "text": "以木桩围住了骄傲的莱茵河，将波罗的海套上了轭，",
        "indent": false
      },
      {
        "text": "阐明了罗马人的法律，充实了诸侯的国库，",
        "indent": false
      },
      {
        "text": "驯服了军营的骄横，平息了诸民族的风暴，",
        "indent": false
      },
      {
        "text": "在饥荒中以东方的谷物喂养了这座城市，",
        "indent": false
      },
      {
        "text": "时而西行，时而穿越荒蛮的南方和严酷的北方，",
        "indent": false
      },
      {
        "text": "在那边筑起了壕沟，在这里修建了城墙，",
        "indent": false
      },
      {
        "text": "在此沉下了堤坝和壁垒，在和平受到威胁之处，",
        "indent": false
      },
      {
        "text": "以桥梁跨越了不列颠人汹涌的河流与礁石密布的波涛，",
        "indent": false
      },
      {
        "text": "为阿拉伯人发现了从未被人知晓的水源，",
        "indent": false
      },
      {
        "text": "将自己的性命置于危险之中，",
        "indent": false
      },
      {
        "text": "为了你元老院的自由，啊罗马，为了你的祭坛，",
        "indent": false
      },
      {
        "text": "几乎日复一日地冒着生命危险，不以任何事为过于沉重，",
        "indent": false
      },
      {
        "text": "以自家财产的损失来增益公共的福祉，",
        "indent": false
      },
      {
        "text": "揭露了敌人的阴谋，将异邦人纳入了同盟，",
        "indent": false
      },
      {
        "text": "将被驱逐者重新安置于帝国，并将那叛逆的势力",
        "indent": false
      }

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序与结构分析</div><div class=\"syntax-normal\">Gilt ein vergifteter Mund mehr als ein reines Gemüt, so fege mein unbeflecktes Geblüt fremde Schuld [hinweg]. — Und dies wird nun mein Lohn: dass ich …</div><div class=\"syntax-gloss\">= 如果一张淬毒的嘴比纯洁的心灵更管用，那就让我无瑕的血脉去洗净他人的罪过吧。——而这便是我如今的报偿：我曾……</div></div>\n<p><b>整体结构：</b>本节是全诗最长的段落（24行），从第131行\"<b>daß ich …</b>\"开始，形成一个巨大的<b>排比/铺陈句</b>（Enumeratio），一直延续到下一节才完成句法闭合。全部24行本质上是<b>一个未完成的长句</b>——主句\"diß wird nun mein Lohn\"（这便是我的报偿）后接连串 daß 从句和独立分词短语。</p>\n<p><b>修辞核心——排比（Anaphora + Enumeratio）：</b></p>\n<ul>\n<li>第131、133、134行以 <b>Daß ich</b> 引导三个平行从句（排比头 Anaphora）</li>\n<li>第137–152行转为密集的<b>过去分词短语</b>（gestützt / gezwungen / umbpfählt / gedrungen / erklärt / erfüllt / gezäumt / gestillt / gespeiset / durchreiset / auffgebaut / gesänckt / überlegt / entdeckt / gewagt / geschätzet / ergetzet / entdeckt / bracht / versetzt），每个短语占半行，以中间停顿（Zäsur）和行末斜杠分隔，形成排炮般的节奏</li>\n<li>地理名词密集出现：<b>Parthen / Nil / Phrat / Rhein / Balth / Ost / West / Sud / Nord / Britten / Araber</b>——帝国四方的意象</li>\n</ul>\n<p><b>句法特征：</b>几乎所有过去分词短语都省略了助动词 <b>habe [ich]</b>（我曾……），形成紧凑的省略句法（Ellipse）。读者需要在每个半句前补上\"[ich habe]\"。</p>",
    "meaning": "<p>这是帕皮尼安诉说自己一生功绩的核心段落。他以一个假设句开篇（\"如果淬毒之口比纯心更有价值\"），然后用\"而这便是我的报偿\"引出一份长长的功劳清单：</p>\n<ul>\n<li><b>军事功绩</b>：在帕提亚、尼罗河、幼发拉底河征战；在莱茵河、波罗的海修筑防线；在不列颠架桥渡河</li>\n<li><b>行政功绩</b>：阐明罗马法律、充实国库、平息军队骄横、赈济饥荒</li>\n<li><b>外交功绩</b>：揭露敌人阴谋、缔结同盟、安置流亡者</li>\n<li><b>个人牺牲</b>：不眠之夜、风餐露宿、以自家财产补贴公共利益、日复一日冒生命危险</li>\n</ul>\n<p>这份清单有意地<b>不结束</b>——句子在第152行仍然悬空（\"und die verschworne Macht\"），语法上需要下一节的第153行才能闭合。这种跨节的句法悬置，形象地表达了帕皮尼安功绩之多，说也说不完。</p>\n<p><b>历史背景：</b>帕皮尼安（Papinianus, 约142–212）是罗马帝国最伟大的法学家之一，塞维鲁皇帝（Severus）的亲信和近卫军长官。此处提到的军事和行政成就融合了历史帕皮尼安和塞维鲁朝廷重臣的集体功绩。</p>",
    "interpretation": "<p><b>修辞传统：</b>这段24行的功绩清单属于古典修辞学中的\"<b>recusatio</b>\"（自辩）和\"<b>enumeratio</b>\"（列举），是巴洛克悲剧中高贵人物的标志性独白方式。格律弗斯（Gryphius）有意让这段清单长到几乎令人窒息——读者/观众和帕皮尼安一样，在列举中感受到功绩之浩瀚与回报之微薄的巨大反差。</p>\n<p><b>帝国地理的展开：</b>从帕提亚（东方）到尼罗河（南方），从莱茵河（西北）到波罗的海（北方），再到不列颠、阿拉伯——帕皮尼安的足迹覆盖了整个罗马帝国的版图。这种地理铺陈是巴洛克文学中\"<b>orbis terrarum</b>\"（天下）主题的典型表现：越是伟大的功绩，越衬托出最终覆灭的悲剧性。</p>\n<p><b>过去分词的修辞效果：</b>密集的过去分词（gestützt, gezwungen, umbpfählt, gedrungen …）形成了一种<b>完成体的堆积</b>——一切都已经做了，一切都已经过去了。这种时态本身就暗示了结局：功绩属于过去，而惩罚属于现在。</p>\n<p><b>未完句（Aposiopese）：</b>全节句法未能闭合，第152行\"und die verschworne Macht\"悬在半空。这既是修辞技巧（让听众期待），也象征帕皮尼安的命运——他的故事还没讲完，就已经被打断。</p>",
    "translationNote": "<p><b>核心难点：</b>本节24行本质上是一个巨型句子，中文不可能保持单句结构。翻译中将过去分词短语拆为独立分句，用逗号和句号断句，但尽量保留了每个半行对应一个动作的节奏。</p>\n<p><b>\"erfrischt\"</b>（第136行）：现代德语中 erfrischen 意为\"使清爽\"，但此处是古义\"使恢复、使解脱\"，译为\"浇灭……恐慌\"。</p>\n<p><b>\"umbpfählt\"</b>（第138行）：um + Pfahl（木桩），指罗马人在莱茵河沿岸修建的边境防御工事（Limes），译为\"以木桩围住\"。</p>\n<p><b>\"Balth\"</b>（第138行）：波罗的海（Baltisches Meer）的巴洛克缩写，\"ans Joch gedrungen\"（套上轭）是帝国征服的比喻。</p>\n<p><b>\"Quällen\"</b>（第146行）：= Quellen（水源），不是 Qualen（痛苦）。巴洛克时期 ä/e 常混用。</p>\n<p><b>\"ergetzet\"</b>（第150行）：= ergötzt，现代意为\"使愉悦\"，此处是古义\"使恢复、增益\"（gemeines Best' ergetzet = 增益了公共福祉）。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">七言古风体尝试（节选）</div><div class=\"translation-box\" style=\"font-size:0.95rem\">\n毒口若能胜净心，清白血脉洗罪尘。<br>\n此即半生辛苦报——几多长夜不成寝，<br>\n远离安眠忧虑深，几多白日风霜侵。<br>\n沧海陆地舍此身，胸前敌血与己混，<br>\n汗浇百郡解民困，东撑帕提西渡莱，<br>\n尼罗幼河尽臣服，北海波罗套轭来。<br>\n释法充库驯骄兵，万民风暴赖我平。<br>\n饥城赈以东方粟，南北西东任远行。<br>\n筑堡修墙沉堤坝，架桥渡过不列颠。<br>\n为罗马自由祭坛故，日日冒死不辞难。<br>\n破家益公揭敌谋，纳盟安民逐叛还。\n</div></div>\n<div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>说明：</b>此为高度意译的七言古风体，旨在传达原文排比铺陈的气势。原文的Alexandriner（亚历山大体）每行12-13音节、对偶排列，与中国七言古诗的对仗传统有结构上的亲缘性。为押韵和对仗，部分内容有所压缩或调整顺序。</div>",

        "de": "In erster Glut erstöckt / was könt ich anders hoffen!",
        "indent": false

        "de": "Ein Schatten-reicher Baum wird von dem Himmel troffen:",

        "de": "Ein Strauch steht unversehrt. Wer die gemeine Noth",
        "indent": false

        "indent": false

        "de": "Wer sich für alle wagt / wird auch nicht einen finden /",
        "indent": false

        "de": "Auff dessen rechte Trew er könn in schiffbruch gründen.",

    "syntax": "<div class=\"syntax-box\"><div class=\"syntax-label\">还原语序</div><div class=\"syntax-normal\">[Ich habe] die verschworne Macht in erster Glut erstöckt — was könnte ich anders hoffen! Ein schattenreicher Baum wird von dem Himmel getroffen; ein Strauch steht unversehrt. Wer sich bemüht, die gemeine Not zu lindern, sucht nichts als [den] eigenen Tod. Wer sich für alle wagt, wird auch nicht einen [Menschen] finden, auf dessen rechte Treue er [sich] in Schiffbruch gründen könne.</div><div class=\"syntax-gloss\">= [我曾]在初燃之火中扼灭了叛逆的势力——我还能指望什么！浓荫大树被天雷击中，灌木却安然无恙。谁竭力减轻公共的苦难，寻到的不过是自己的死亡。谁为所有人冒险，将找不到哪怕一个人，能让他在船难中凭借其忠诚而立足。</div></div>\n<p><b>句法衔接：</b>第153行\"In erster Glut erstöckt\"是上一节第152行\"und die verschworne Macht\"的续接——\"die verschworne Macht in erster Glut erstöckt\"（在初生的烈焰中扼灭了叛逆的势力）。这完成了跨越两节、长达24+1行的巨型句子。</p>\n<p><b>格言句式：</b>第154–158行转为三组精炼的<b>格言（Sentenz/Gnome）</b>：(1) 大树被雷击，灌木无恙；(2) 为众人减苦者只得一死；(3) 为所有人冒险者找不到一个忠诚的人。每组都是\"Wer …\"（谁……）引导的关系从句 + 主句的经典格言结构。</p>\n<p><b>\"könn\"</b>（第158行）= könne，虚拟式第一式（Konjunktiv I），用于关系从句中表示可能性/目的。</p>",
    "meaning": "<p>这是独白的终结段。帕皮尼安完成了漫长的功绩清单（上一节），用一个苦涩的反问收尾：\"我还能期望什么！\"</p>\n<p>然后他引出全诗最核心的比喻：<b>浓荫大树与矮小灌木</b>。高大的树招引雷电，矮小的灌木反而安全——这是对\"木秀于林，风必摧之\"这一古老智慧的巴洛克式表达。帕皮尼安就是那棵大树：功绩越高，越容易成为天雷（权力嫉妒）的目标。</p>\n<p>最后两联是帕皮尼安对人性的悲观总结：为公共福祉献身的人只会找到死亡，而在灾难（\"Schiffbruch\"船难）来临时，没有任何人会以真正的忠诚来回报他。</p>",
    "interpretation": "<p><b>大树与雷电（Emblem 传统）：</b>\"浓荫大树被天雷击中\"是巴洛克时期极为流行的<b>徽章图像（Emblem）</b>。在17世纪的徽章书中，被雷击的大树代表\"伟人遭嫉\"或\"命运无常\"（Fortuna）。格律弗斯将这个视觉意象转化为诗歌语言，观众/读者会立刻识别出这一文化密码。</p>\n<p><b>Vanitas 主题的收束：</b>整篇独白从权力的巅峰（第1节\"Wer über alle steigt\"）写到孤立无援的结局——这是一个完整的<b>命运之轮（Rota Fortunae）</b>叙事。帕皮尼安的功绩清单越长，最终的孤独就越令人震撼。</p>\n<p><b>船难比喻（Schiffbruch）：</b>\"Schiffbruch\"（船难）是斯多葛哲学和巴洛克文学中的常见比喻：人生如航海，灾难随时降临。帕皮尼安说他在\"船难\"中找不到一个可以信赖的人——这既是对朝中友人的控诉，也是斯多葛式的自我认知：真正的德行者注定孤独。</p>\n<p><b>开放式结尾：</b>独白以一个否定性的格言结束（\"找不到一个人……\"），没有任何解决或安慰。这种不给出希望的结尾是格律弗斯悲剧的特征：英雄的德行不带来世俗的回报，只指向超越性的精神胜利——但那属于剧情的后续发展。</p>",
    "translationNote": "<p><b>\"erstöckt\"</b>（第153行）：巴洛克拼写 = erstickt（扼灭）。此词衔接上节——\"die verschworne Macht … in erster Glut erstöckt\"（在初燃的烈焰中扼灭了叛逆的势力）。\"erster Glut\"指叛乱刚起之时。</p>\n<p><b>\"troffen\"</b>（第154行）：= getroffen，巴洛克诗歌中过去分词常省略 ge- 前缀以适应格律。</p>\n<p><b>\"gemeine Noth\"</b>（第155行）：gemein 在此处是中性的\"公共的\"（= allgemein），不是现代贬义的\"卑鄙的\"。Noth = Not（困苦）。</p>\n<p><b>\"Trew\"</b>（第158行）：= Treue（忠诚）。巴洛克时期 -ew / -eue 常互换。</p>\n<p><b>\"könn\"</b>（第158行）：= könne（虚拟式），表示\"可能凭借其忠诚而立足\"。</p>\n<p><b>全节翻译策略：</b>本节从排比铺陈急转为格言警句，中文翻译力求保持这种节奏的断裂感——从长句突然切换为短促有力的判断句。</p>",
    "altTranslation": "<div class=\"alt-translation\"><div class=\"alt-translation-label\">五七言体尝试</div><div class=\"translation-box\" style=\"font-size:0.95rem\">\n叛焰初燃即扑灭——还望什么恩报！<br>\n参天大树遭雷殛，矮丛安然好。<br>\n为民纾难者，所得唯一死；<br>\n舍身为天下，无人可倚靠。<br>\n纵有千帆覆，忠心何处找？\n</div></div>\n<div style=\"margin-top:8px;font-size:0.85rem;color:#6d5f4a\"><b>说明：</b>大树遭雷的意象与中国\"木秀于林，风必摧之\"（《世说新语》引李康《运命论》）高度契合。此处用\"雷殛\"对应原文 \"vom Himmel troffen\"。\"船难\"（Schiffbruch）意译为\"千帆覆\"以融入中文诗歌意象。</div>",

// ============================================================
// RENDER
// ============================================================
function render() {
  const main = document.getElementById('main-content');
  let lineCounter = 0;

  SECTIONS.forEach(st => {
    // German section cell
    const deDiv = document.createElement('div');
    deDiv.className = 'stanza';
    deDiv.dataset.stanza = st.id;

    const label = document.createElement('div');
    label.className = 'stanza-num';
    label.textContent = st.label || `Abschnitt ${st.id}`;
    deDiv.appendChild(label);

    st.lines.forEach(line => {
      lineCounter++;
      const p = document.createElement('div');
      p.className = 'poem-line';
      // Line number
      const numSpan = document.createElement('span');
      numSpan.className = 'line-num';
      numSpan.textContent = lineCounter;
      p.appendChild(numSpan);
      // Tokenize and wrap annotated words
      const tokens = line.de.split(/\s+/);
      tokens.forEach((token, ti) => {
        if (ti > 0) p.appendChild(document.createTextNode(' '));
        const match = token.match(/^([A-Za-z\u00C0-\u024F\u00E4\u00F6\u00FC\u00C4\u00D6\u00DC\u00DF\u0027\u2019]+)([^A-Za-z\u00C0-\u024F\u00E4\u00F6\u00FC\u00C4\u00D6\u00DC\u00DF]*)$/);
        if (match) {
          const wordText = match[1];
          const punct = match[2];
          const wordInfo = st.words ? st.words.find(w => w.form === wordText) : null;
          if (wordInfo) {
            const span = document.createElement('span');
            span.className = 'word ' + (wordInfo.cls || '');
            span.textContent = wordText;
            span.dataset.stanza = st.id;
            span.dataset.form = wordInfo.form;
            p.appendChild(span);
          } else {
            p.appendChild(document.createTextNode(wordText));
          }
          if (punct) p.appendChild(document.createTextNode(punct));
        } else {
          p.appendChild(document.createTextNode(token));
        }
      });
      deDiv.appendChild(p);
    });

    deDiv.addEventListener('click', (e) => {
      if (!e.target.closest('.word')) openCommentary(st.id);
    });
    main.appendChild(deDiv);

    // Chinese translation cell
    const cnDiv = document.createElement('div');
    cnDiv.className = 'stanza';
    cnDiv.dataset.stanzaCn = st.id;
    const cnLabel = document.createElement('div');
    cnLabel.className = 'stanza-num';
    cnLabel.textContent = '\u00a0';
    cnDiv.appendChild(cnLabel);
    if (st.cn) {
      st.cn.forEach(line => {
        const p = document.createElement('div');
        p.className = 'translation-line';
        p.textContent = line.text;
        cnDiv.appendChild(p);
      });
    }
    cnDiv.addEventListener('click', () => openCommentary(st.id));
    main.appendChild(cnDiv);
  });
}

// ============================================================
// TOOLTIP
// ============================================================
const tooltipEl = document.getElementById('tooltip');
let currentWord = null;

document.addEventListener('click', (e) => {
  const wordEl = e.target.closest('.word');
  if (wordEl) {
    e.stopPropagation();
    showTooltip(wordEl);
    return;
  }
  hideTooltip();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideTooltip(); });

function showTooltip(el) {
  const sid = parseInt(el.dataset.stanza);
  const form = el.dataset.form;
  const st = SECTIONS.find(s => s.id === sid);
  if (!st) return;
  const w = st.words.find(x => x.form === form);
  if (!w) return;

  if (currentWord) currentWord.style.background = '';
  currentWord = el;
  el.style.background = 'var(--highlight)';

  tooltipEl.innerHTML = `
    <div class="tooltip-lemma">${w.lemma}</div>
    <span class="tooltip-pos">${w.pos}</span>
    ${w.info ? `<div class="tooltip-info">${w.info}</div>` : ''}
    <div class="tooltip-gloss">${w.gloss}</div>
  `;

  const rect = el.getBoundingClientRect();
  let top = rect.bottom + window.scrollY + 8;
  let left = rect.left + window.scrollX;
  tooltipEl.style.visibility = 'hidden';
  tooltipEl.classList.add('visible');
  const tw = tooltipEl.offsetWidth || 200;
  const th = tooltipEl.offsetHeight || 100;
  if (rect.bottom + th + 8 > window.innerHeight) top = rect.top + window.scrollY - th - 8;
  if (left + tw > window.innerWidth - 16) left = window.innerWidth - tw - 16;
  if (left < 8) left = 8;
  tooltipEl.style.top = top + 'px';
  tooltipEl.style.left = left + 'px';
  tooltipEl.style.visibility = '';
}

function hideTooltip() {
  if (currentWord) { currentWord.style.background = ''; currentWord = null; }
  tooltipEl.classList.remove('visible');
}

// ============================================================
// COMMENTARY PANEL
// ============================================================
const panel = document.getElementById('commentary-panel');
let currentStanza = null;

document.getElementById('commentary-close').addEventListener('click', closePanel);
panel.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function openCommentary(stanzaId) {
  document.querySelectorAll('.stanza.active').forEach(el => el.classList.remove('active'));
  currentStanza = stanzaId;

  document.querySelectorAll(`.stanza[data-stanza="${stanzaId}"], .stanza[data-stanza-cn="${stanzaId}"]`)
    .forEach(el => el.classList.add('active'));

  const st = SECTIONS.find(s => s.id === stanzaId);
  if (!st) return;

  // Wortschatz tab
  const wEl = document.getElementById('tab-wortschatz');
  if (st.words && st.words.length > 0) {
    wEl.innerHTML = st.words.map(w => `
      <div class="vocab-entry">
        <span class="vocab-word">${w.form}</span>
        <span class="vocab-pos">${w.pos}</span>
        — <span class="vocab-def">${w.lemma}：${w.gloss}</span>
        ${w.info ? `<br><small style="color:#8a7e6b">${w.info}</small>` : ''}
      </div>
    `).join('');
  } else {
    wEl.innerHTML = '<p style="color:#b5a990;font-style:italic">暂无词汇注释。</p>';
  }

  // Syntax
  document.getElementById('tab-syntax').innerHTML = st.syntax || '';
  // Meaning
  document.getElementById('tab-meaning').innerHTML = st.meaning || '';
  // Interpretation
  document.getElementById('tab-interpretation').innerHTML = st.interpretation || '';

  // Metrik
  const mEl = document.getElementById('tab-metrik');
  const met = st.meter;
  if (met) {
    let mHTML = `<div class="meter-summary">${met.summary}</div>`;
    mHTML += '<div style="margin-bottom:12px">';
    if (met.scansion) {
      met.scansion.forEach(s => {
        const rc = s.rhyme === 'a' ? 'rhyme-a' : s.rhyme === 'b' ? 'rhyme-b' : s.rhyme === 'c' ? 'rhyme-c' : 'rhyme-d';
        mHTML += `<div class="meter-row">`;
        mHTML += `<span class="rhyme-tag ${rc}">${s.rhyme}</span>`;
        if (s.syls) {
          mHTML += `<div class="meter-syllables">`;
          s.syls.forEach(syl => {
            if (syl.t === '||') {
              mHTML += `<div class="meter-caesura">||</div>`;
            } else {
              const cls = syl.s ? 'meter-stressed' : 'meter-unstressed';
              mHTML += `<div class="meter-syl ${cls}"><span class="meter-syl-mark">${syl.s ? '\u00d7\u0301' : '\u00d7'}</span><span class="meter-syl-text">${syl.t}</span></div>`;
            }
          });
          mHTML += `</div>`;
        }
        mHTML += `<span style="font-size:0.72rem;color:#8a7e6b;white-space:nowrap;margin-left:auto">${s.ending || ''}</span>`;
        mHTML += `</div>`;
      });
    }
    mHTML += '</div>';
    if (met.note) mHTML += met.note;
    mEl.innerHTML = mHTML;
  } else {
    mEl.innerHTML = '';
  }

  // Translation
  const tEl = document.getElementById('tab-translation');
  let tHTML = '<div class="translation-box">';
  if (st.cn) st.cn.forEach(l => { tHTML += `<div>${l.text}</div>`; });
  tHTML += '</div>';
  if (st.translationNote) tHTML += '<div style="margin-top:8px;font-size:0.85rem;color:#6d5f4a"><b>译注：</b>' + st.translationNote.replace(/<\/?p>/g, '') + '</div>';
  if (st.altTranslation) tHTML += st.altTranslation;
  tEl.innerHTML = tHTML;

  panel.classList.add('open');
  switchTab('wortschatz');
}

function closePanel() {
  panel.classList.remove('open');
  document.querySelectorAll('.stanza.active').forEach(el => el.classList.remove('active'));
  currentStanza = null;
}

function switchTab(name) {
  panel.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  panel.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
}

// Esc closes panel
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && panel.classList.contains('open')) closePanel();
});

// Init
render();
</script>
